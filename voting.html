<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIBU eVote | Cast Your Vote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0a2c4e;
            --secondary-blue: #1e4a7a;
            --light-blue: #eef5ff;
            --accent-gold: #f5b342;
            --dark-gold: #d4942c;
            --pure-white: #ffffff;
            --off-white: #f8fafc;
            --sidebar-bg: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --text-lighter: #94a3b8;
            --success-green: #10b981;
            --border-color: #edf2f7;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--off-white);
            color: var(--text-dark);
            line-height: 1.5;
        }

        .voting-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow-sm);
            z-index: 10;
        }

        .sidebar-inner {
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
            padding-bottom: 1.25rem;
            border-bottom: 2px solid var(--border-color);
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--accent-gold);
            font-weight: 800;
        }

        .user-card {
            background: linear-gradient(145deg, #f8fcff, #f0f7ff);
            border-radius: 24px;
            padding: 2rem 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(245, 179, 66, 0.15);
            box-shadow: 0 10px 25px -10px rgba(10, 44, 78, 0.15);
            position: relative;
            text-align: center;
        }

        .user-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 20px;
            right: 20px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-gold), var(--primary-blue));
            border-radius: 0 0 10px 10px;
        }

        .user-avatar-large {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, var(--primary-blue), #2d5a8c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            color: white;
            font-size: 2.2rem;
            font-weight: 600;
            border: 4px solid var(--pure-white);
            box-shadow: 0 8px 15px rgba(10, 44, 78, 0.2);
        }

        .user-name-large {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.3rem;
            letter-spacing: -0.3px;
        }

        .user-reg-large {
            font-size: 0.9rem;
            color: var(--text-light);
            background: rgba(255,255,255,0.8);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid var(--border-color);
            margin-bottom: 1.25rem;
        }

        .wallet-status-card {
            background: var(--pure-white);
            border-radius: 16px;
            padding: 1.25rem 1rem;
            margin-top: 0.5rem;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .wallet-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.8rem;
        }

        .wallet-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f59e0b;
            position: relative;
        }

        .wallet-indicator.connected {
            background: var(--success-green);
        }

        .wallet-indicator.connected::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.3);
            top: -2px;
            left: -2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            70% { transform: scale(1.8); opacity: 0; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .wallet-address {
            background: #f1f5f9;
            border-radius: 10px;
            padding: 0.6rem 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .copy-icon {
            color: var(--text-light);
            cursor: pointer;
            transition: color 0.2s;
        }

        .connect-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 0.2rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .selections-section {
            margin-top: 2rem;
            flex: 1;
        }

        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .section-title h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-lighter);
            font-weight: 600;
        }

        .section-title span {
            background: var(--light-blue);
            padding: 0.2rem 0.6rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary-blue);
        }

        .selections-container {
            background: var(--off-white);
            border-radius: 18px;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            max-height: 380px;
            overflow-y: auto;
        }

        .selection-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1rem;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s;
            border-radius: 12px;
            margin-bottom: 2px;
        }

        .selection-item:last-child {
            border-bottom: none;
        }

        .selection-position {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .position-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-gold);
            opacity: 0.5;
        }

        .selection-candidate {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            background: rgba(245, 179, 66, 0.1);
            color: var(--dark-gold);
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .selection-candidate.not-selected {
            background: #f1f5f9;
            color: var(--text-lighter);
            font-weight: 400;
        }

        .security-badges {
            margin-top: 2rem;
            padding: 1.25rem;
            background: #f8fafc;
            border-radius: 18px;
            border: 1px dashed var(--border-color);
        }

        .badge-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.8rem;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .main-content {
            margin-left: 320px;
            width: calc(100% - 320px);
            padding: 2rem;
        }

        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        .election-header {
            background: linear-gradient(135deg, var(--primary-blue), #123b66);
            border-radius: 30px;
            padding: 2.5rem;
            color: white;
            margin-bottom: 2rem;
            box-shadow: 0 20px 30px -10px rgba(10, 44, 78, 0.3);
            position: relative;
            overflow: hidden;
        }

        .election-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
            position: relative;
        }

        .election-meta {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            position: relative;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .progress-tracker {
            background: var(--pure-white);
            border-radius: 20px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .progress-bar-container {
            width: 100%;
            height: 10px;
            background: var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold), #f7c35c);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .position-card {
            background: var(--pure-white);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .position-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .position-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-blue);
            padding-bottom: 0.8rem;
            margin-bottom: 1.2rem;
            border-bottom: 2px solid var(--accent-gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .position-badge {
            background: var(--light-blue);
            color: var(--primary-blue);
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .candidate-item {
            display: flex;
            align-items: flex-start;
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--pure-white);
        }

        .candidate-item:hover {
            border-color: var(--accent-gold);
            background: #fff9f0;
        }

        .candidate-item.selected {
            border-color: var(--accent-gold);
            background: #fff9f0;
            box-shadow: 0 4px 12px rgba(245, 179, 66, 0.15);
        }

        .candidate-radio {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            margin-right: 1rem;
            margin-top: 2px;
            position: relative;
            flex-shrink: 0;
        }

        .candidate-item.selected .candidate-radio {
            border-color: var(--accent-gold);
        }

        .candidate-item.selected .candidate-radio::after {
            content: '';
            width: 14px;
            height: 14px;
            background: var(--accent-gold);
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
        }

        .candidate-info {
            flex: 1;
        }

        .candidate-name {
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 0.2rem;
            font-size: 1rem;
        }

        .candidate-course {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 0.4rem;
        }

        .candidate-manifesto {
            font-size: 0.8rem;
            color: var(--text-light);
            font-style: italic;
            line-height: 1.4;
            background: #fafafa;
            padding: 0.5rem;
            border-radius: 8px;
            border-left: 2px solid var(--accent-gold);
        }

        .btn-back {
            padding: 1rem 2rem;
            background: #64748b;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-buttons {
            position: sticky;
            bottom: 2rem;
            background: var(--pure-white);
            padding: 1.5rem 2rem;
            border-radius: 100px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            border: 1px solid var(--border-color);
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-save {
            padding: 1rem 2rem;
            background: var(--pure-white);
            border: 2px solid var(--primary-blue);
            border-radius: 60px;
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-submit {
            padding: 1rem 3rem;
            background: var(--primary-blue);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px -8px var(--primary-blue);
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--secondary-blue);
            transform: translateY(-2px);
        }

        .btn-submit:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            background: var(--off-white);
            border-radius: 12px;
            border: 2px dashed var(--border-color);
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .main-content {
                margin-left: 0;
                width: 100%;
            }
            .action-buttons {
                flex-direction: column;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="voting-layout">
        <aside class="sidebar">
            <div class="sidebar-inner">
                <div class="sidebar-logo">
                    <div class="logo-text">KIBU<span>eVote</span></div>
                </div>

                <div class="user-card">
                    <div class="user-avatar-large" id="userInitials">KJ</div>
                    <div class="user-name-large" id="userFullName">Loading...</div>
                    <div class="user-reg-large" id="userRegNumber">Loading...</div>
                    
                    <div class="wallet-status-card" id="walletStatusCard">
                        <div class="wallet-label">
                            <span class="wallet-indicator" id="walletIndicator"></span>
                            <span id="walletStatusText">Checking wallet...</span>
                        </div>
                        <div class="wallet-address" id="walletAddress">
                            <span>Not connected</span>
                        </div>
                    </div>
                </div>

                <div class="selections-section">
                    <div class="section-title">
                        <h3>YOUR SELECTIONS</h3>
                        <span id="selectedCount">0/0</span>
                    </div>
                    <div class="selections-container" id="selectionsList"></div>
                </div>

                <div class="security-badges">
                    <div class="badge-item">🔒 All votes are encrypted</div>
                    <div class="badge-item">⛓️ Stored on blockchain</div>
                    <div class="badge-item">✓ Verifiable after submission</div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="content-wrapper">
                <div class="election-header">
                    <h1 id="electionTitle">Loading Election...</h1>
                    <div class="election-meta">
                        <div class="meta-item">⏰ <span id="endDateText">Ends: Loading...</span></div>
                        <div class="meta-item">👥 <span id="totalVotersText">Loading...</span></div>
                    </div>
                </div>

                <div class="progress-tracker">
                    <div class="progress-header">
                        <span class="progress-count"><span id="completedCount">0</span> of <span id="totalPositions">0</span> completed</span>
                        <span class="progress-percentage" id="progressPercentage">0%</span>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="progressBar" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="positions-grid" id="positionsGrid"></div>

                <div class="action-buttons">
                    <button class="btn-back" onclick="goToDashboard()">🏠 Back to Dashboard</button>
                    <button class="btn-save" onclick="saveDraft()">💾 Save Draft</button>
                    <button class="btn-submit" id="submitBtn" onclick="submitVoteWithSignature()" disabled>⛓️ Submit Vote</button>
                </div>
            </div>
        </main>
    </div>

    <script>const API_BASE = 'https://kibu-evote-backend.onrender.com/api/v1';</script>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    
    <script>
        // ========== CONFIGURATION ==========
        let POSITIONS = [];
        let selectedVotes = {};
        let web3;
        let userAccount = null;
        let CANDIDATES = {};
        let currentElection = null;
        let hasVoted = false;

        // ========== HELPER FUNCTIONS ==========
        function goToDashboard() {
            window.location.href = 'dashboard.html';
        }

        // ========== LOAD CANDIDATES FROM BACKEND ==========
        async function loadCandidates() {
            console.log('🔄 Loading candidates...');
            let activeElection = null;
            let selectedElectionId = sessionStorage.getItem('selectedElectionId');
            
            try {
                const res = await fetch(`${API_BASE}/elections`);
                const data = await res.json();
                let elections = data.data || [];
                
                if (selectedElectionId) {
                    activeElection = elections.find(e => e._id == selectedElectionId);
                } else {
                    activeElection = elections.find(e => e.status === 'active');
                }
                
                if (activeElection) {
                    console.log('✅ Found election:', activeElection.title);
                    currentElection = activeElection;
                    
                    const positionsRes = await fetch(`${API_BASE}/positions/election/${activeElection._id}`);
                    const positionsData = await positionsRes.json();
                    let positions = positionsData.data || [];
                    
                    const candidatesRes = await fetch(`${API_BASE}/candidates/election/${activeElection._id}`);
                    const candidatesData = await candidatesRes.json();
                    let allCandidates = candidatesData.data || [];
                    
                    processElectionData(activeElection, positions, allCandidates);
                    return;
                }
            } catch(e) {
                console.warn('API failed', e);
            }
            
            if (!activeElection) {
                document.getElementById('positionsGrid').innerHTML = '<div class="empty-state">No active election found</div>';
            }
        }

        function processElectionData(election, positions, allCandidates) {
            currentElection = election;
            
            document.getElementById('electionTitle').textContent = election.title;
            document.getElementById('endDateText').textContent = `Ends: ${new Date(election.endDate).toLocaleString()}`;
            document.getElementById('totalVotersText').textContent = `Total voters: ${election.totalVoters || 15000}`;
            
            if (!positions || positions.length === 0) {
                document.getElementById('positionsGrid').innerHTML = '<div class="empty-state">No positions set up</div>';
                return;
            }
            
            POSITIONS = positions.map(p => p.title);
            document.getElementById('totalPositions').textContent = POSITIONS.length;
            
            const newCandidates = {};
            for (const position of POSITIONS) {
                let posCands = allCandidates.filter(c => c.positionTitle === position);
                if (!posCands.length) {
                    newCandidates[position] = [{ name: 'No candidates available', course: '', manifesto: '', candidateId: 0 }];
                } else {
                    newCandidates[position] = posCands.map(c => ({
                        name: c.name,
                        course: c.course || 'Student',
                        manifesto: c.manifesto || 'Vote for me!',
                        candidateId: c.candidateId || c._id
                    }));
                }
            }
            
            CANDIDATES = newCandidates;
            selectedVotes = {};
            loadPositions();
            updateSelectionsList();
            updateProgress();
            
            console.log(`✅ Loaded ${Object.keys(CANDIDATES).length} positions`);
        }

        function loadPositions() {
            const grid = document.getElementById('positionsGrid');
            grid.innerHTML = '';
            
            for (const position of POSITIONS) {
                const candidates = CANDIDATES[position] || [];
                let candidatesHtml = '';
                
                candidates.forEach(candidate => {
                    const isSelected = selectedVotes[position] === candidate.name;
                    candidatesHtml += `<div class="candidate-item ${isSelected ? 'selected' : ''}" onclick="selectCandidate('${position}', '${candidate.name.replace(/'/g, "\\'")}')">
                        <div class="candidate-radio"></div>
                        <div class="candidate-info">
                            <div class="candidate-name">${candidate.name}</div>
                            <div class="candidate-course">${candidate.course}</div>
                            <div class="candidate-manifesto">"${candidate.manifesto}"</div>
                        </div>
                    </div>`;
                });
                
                grid.innerHTML += `<div class="position-card">
                    <div class="position-title">${position}<span class="position-badge">${candidates.length} candidates</span></div>
                    ${candidatesHtml}
                </div>`;
            }
        }

        function selectCandidate(position, candidate) {
            selectedVotes[position] = candidate;
            loadPositions();
            updateSelectionsList();
            updateProgress();
            autoSaveDraft();
        }

        function updateProgress() {
            const completed = Object.keys(selectedVotes).length;
            const total = POSITIONS.length;
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('progressPercentage').textContent = percentage + '%';
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('selectedCount').textContent = `${completed}/${total}`;
            document.getElementById('submitBtn').disabled = completed < total || total === 0 || hasVoted;
        }

        function updateSelectionsList() {
            const list = document.getElementById('selectionsList');
            list.innerHTML = '';
            for (const position of POSITIONS) {
                const vote = selectedVotes[position] || 'Not selected';
                list.innerHTML += `<div class="selection-item">
                    <span class="selection-position">${position}</span>
                    <span class="selection-candidate">${vote}</span>
                </div>`;
            }
        }

        function autoSaveDraft() {
            const regNumber = sessionStorage.getItem('regNumber');
            if (regNumber && Object.keys(selectedVotes).length > 0) {
                localStorage.setItem(`draft_${regNumber}`, JSON.stringify(selectedVotes));
            }
        }

        function saveDraft() {
            const regNumber = sessionStorage.getItem('regNumber');
            if (regNumber) {
                localStorage.setItem(`draft_${regNumber}`, JSON.stringify(selectedVotes));
                alert('✅ Draft saved!');
            }
        }

        function loadDraft() {
            const regNumber = sessionStorage.getItem('regNumber');
            if (regNumber) {
                const saved = localStorage.getItem(`draft_${regNumber}`);
                if (saved) {
                    const draft = JSON.parse(saved);
                    if (confirm('Load saved draft?')) {
                        selectedVotes = draft;
                        loadPositions();
                        updateSelectionsList();
                        updateProgress();
                    }
                }
            }
        }

        // ========== WALLET CONNECTION ==========
        async function checkWalletConnection() {
            if (typeof window.ethereum !== 'undefined') {
                web3 = new Web3(window.ethereum);
                try {
                    const accounts = await web3.eth.getAccounts();
                    if (accounts.length > 0) {
                        userAccount = accounts[0];
                        document.getElementById('walletIndicator').className = 'wallet-indicator connected';
                        document.getElementById('walletStatusText').innerHTML = '<span style="color:#10b981;">● Connected</span>';
                        document.getElementById('walletAddress').innerHTML = `<span>${userAccount.slice(0,6)}...${userAccount.slice(-4)}</span><span class="copy-icon" onclick="copyAddress()">📋</span>`;
                        
                        // Check if already voted
                        await checkIfAlreadyVoted();
                    } else {
                        document.getElementById('walletAddress').innerHTML = `<span>Click to connect</span><button class="connect-btn" onclick="connectWallet()">Connect</button>`;
                    }
                } catch(error) {
                    console.error(error);
                }
            } else {
                document.getElementById('walletStatusText').innerHTML = '<span style="color:#ef4444;">● Install MetaMask</span>';
            }
        }

        async function connectWallet() {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                await checkWalletConnection();
                return true;
            } catch (error) {
                alert('Failed to connect wallet');
                return false;
            }
        }

        function copyAddress() {
            if (userAccount) {
                navigator.clipboard.writeText(userAccount);
                alert('Address copied!');
            }
        }

        async function checkIfAlreadyVoted() {
            if (!userAccount || !currentElection) return;
            
            try {
                const response = await fetch(`${API_BASE}/votes/check/${userAccount}`);
                const data = await response.json();
                if (data.hasVoted) {
                    hasVoted = true;
                    document.getElementById('submitBtn').disabled = true;
                    document.getElementById('submitBtn').innerHTML = '✅ Already Voted';
                    alert('You have already voted in this election!');
                }
            } catch(e) {
                console.log('Check vote error:', e);
            }
        }

        // ========== GASLESS VOTING - SIGNATURE METHOD ==========
        async function submitVoteWithSignature() {
            // Check if wallet connected
            if (!userAccount) {
                const connected = await connectWallet();
                if (!connected) {
                    alert('Please connect your wallet first');
                    return;
                }
            }
            
            // Check if already voted
            if (hasVoted) {
                alert('❌ You have already voted!');
                return;
            }
            
            // Check all positions selected
            const completed = Object.keys(selectedVotes).length;
            if (completed < POSITIONS.length) {
                alert(`Please complete all ${POSITIONS.length} positions. You have ${completed}.`);
                return;
            }
            
            // Prepare vote summary for confirmation
            let summary = '🗳️ CONFIRM YOUR VOTES (GAS FREE!)\n\n';
            for (const [position, candidate] of Object.entries(selectedVotes)) {
                summary += `${position}: ${candidate}\n`;
            }
            summary += '\n⚠️ You will ONLY sign a message. NO gas fee required!\n\nClick OK to continue.';
            
            if (!confirm(summary)) return;
            
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="loading-spinner"></span> Preparing vote...';
            btn.disabled = true;
            
            try {
                // 1. Prepare vote data
                const positionIds = [];
                const candidateIds = [];
                
                for (let i = 0; i < POSITIONS.length; i++) {
                    const position = POSITIONS[i];
                    const candidateName = selectedVotes[position];
                    const candidateObj = CANDIDATES[position]?.find(c => c.name === candidateName);
                    positionIds.push(i);
                    candidateIds.push(candidateObj?.candidateId || 0);
                }
                
                const voteMessage = {
                    electionId: currentElection._id,
                    electionTitle: currentElection.title,
                    positionIds: positionIds,
                    candidateIds: candidateIds,
                    voter: userAccount,
                    regNumber: sessionStorage.getItem('regNumber'),
                    timestamp: Date.now()
                };
                
                btn.innerHTML = '<span class="loading-spinner"></span> Please sign in MetaMask...';
                
                // 2. Sign the message (FREE - no gas!)
                const message = JSON.stringify(voteMessage);
                const signature = await web3.eth.personal.sign(message, userAccount);
                
                btn.innerHTML = '<span class="loading-spinner"></span> Submitting to server...';
                
                // 3. Send signature to backend (admin will pay gas)
                const response = await fetch('https://kibu-evote-backend.onrender.com/api/relay-vote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        signature: signature,
                        voteData: voteMessage,
                        voterAddress: userAccount,
                        regNumber: sessionStorage.getItem('regNumber')
                    })
                });
                
                const result = await response.json();

                console.log('📡 Relayer response:', result);
                
                if (result.success) {
                    console.log('✅ Vote successful! TX Hash:', result.txHash);

                    hasVoted = true;
                    localStorage.setItem(`hasVoted_${sessionStorage.getItem('regNumber')}`, 'true');
                    localStorage.removeItem(`draft_${sessionStorage.getItem('regNumber')}`);
                    
                    alert(`✅ VOTE SUBMITTED!\n\nTransaction Hash: ${result.txHash.slice(0,10)}...\n\nYour vote has been recorded on the blockchain. Admin paid the gas fee!`);
                    window.location.href = 'results.html';
                } else {
                    console.error('❌ Vote failed:', result.error);
                    throw new Error(result.error || 'Submission failed');
                }
                
            } catch (error) {
                console.error('Vote error:', error);
                let errorMsg = error.message;
                if (error.code === 4001) {
                    errorMsg = 'You rejected the signature request.';
                }
                alert('❌ Failed to submit vote: ' + errorMsg);
                btn.innerHTML = '⛓️ Submit Vote (No Gas Fee!)';
                btn.disabled = false;
            }
        }

        // ========== USER DATA ==========
        function loadUserData() {
            const userName = sessionStorage.getItem('userName') || 'Kiprotich John';
            const regNumber = sessionStorage.getItem('regNumber') || 'BIT/0025/23';
            document.getElementById('userFullName').textContent = userName;
            document.getElementById('userRegNumber').textContent = regNumber;
            const initials = userName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            document.getElementById('userInitials').textContent = initials;
        }

        // ========== INITIALIZE PAGE ==========
        document.addEventListener('DOMContentLoaded', async function() {
            loadUserData();
            await loadCandidates();
            await checkWalletConnection();
            loadDraft();
        });
    </script>
</body>
</html>
