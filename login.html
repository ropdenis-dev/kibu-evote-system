<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIBU eVote | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
   <style>
          * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary-blue: #1a4b8c;
  --secondary-blue: #2a6bc1;
  --light-blue: #e8f0fe;
  --accent-gold: #ffb347;
  --dark-gold: #d48c2c;
  --pure-white: #ffffff;
  --off-white: #f8fafc;
  --text-dark: #1e293b;
  --text-light: #64748b;
  --success-green: #10b981;
  --border-color: #e2e8f0;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, var(--light-blue) 0%, var(--pure-white) 100%);
  min-height: 100vh;
  height: 100vh;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  margin: 0;
  overflow: hidden;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
}

/* POSITIONING: Perfect fit on all screens */
.login-container {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  margin: 0;
}

.login-card {
  background: var(--pure-white);
  border-radius: 28px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
  padding: 2rem 2rem;
  position: relative;
  overflow-y: auto;
  overflow-x: hidden;
  width: 100%;
  max-width: 460px;
  max-height: 90vh;
  transition: all 0.2s ease;
}

/* Hide scrollbar for cleaner look (optional) */
.login-card::-webkit-scrollbar {
  width: 5px;
}

.login-card::-webkit-scrollbar-track {
  background: var(--border-color);
  border-radius: 10px;
  margin: 10px 0;
}

.login-card::-webkit-scrollbar-thumb {
  background: var(--primary-blue);
  border-radius: 10px;
}

.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 5px;
  background: linear-gradient(90deg, var(--primary-blue), var(--accent-gold));
   border-radius: 28px 28px 0 0;
}

.logo-section {
  text-align: center;
  margin-bottom: 1.7rem;
}

.logo-section img {
  width: 70px;
  height: 70px;
  border-radius: 18px;
  margin-bottom: 1rem;
  background: var(--light-blue);
  padding: 10px;
   object-fit: contain;
}

.logo-section h1 {
  font-size: 1.85rem;
  color: var(--primary-blue);
  font-weight: 300;
  margin-bottom: 0.3rem;
  letter-spacing: -0.3px;
}

.logo-section p {
  color: var(--text-light);
  font-size: 0.9rem;
  font-weight: 300;
}

.logo-section span {
  color: var(--accent-gold);
  font-weight: 300;
}

.form-group {
  margin-bottom: 1.35rem;
}

.form-group label {
  display: block;
  margin-bottom: 0.5rem;
  color: var(--text-dark);
  font-weight: 300;
  font-size: 0.9rem;
}

.form-group input {
  width: 100%;
  padding: 0.8rem 1rem;
  border: 1px solid var(--border-color);
  border-radius: 12px;
  font-size: 1rem;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
}

.form-group input:focus {
  border-color: var(--accent-gold);
  outline: none;
  box-shadow: 0 0 0 4px rgba(255, 180, 71, 0.1);
}

.input-hint {
  font-size: 0.7rem;
  color: var(--text-light);
  margin-top: 0.4rem;
  display: block;
  font-weight: 300;
}

/* Password wrapper styles */
.password-wrapper {
  position: relative;
  width: 100%;
}

.password-wrapper input {
  width: 100%;
  padding-right: 45px;
}

.password-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  color: var(--text-light);
  transition: color 0.2s;
  padding: 4px 8px;
  border-radius: 8px;
  font-weight: 300;
}

.password-toggle:hover {
  color: var(--primary-blue);
  background: rgba(0, 0, 0, 0.05);
}

.form-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.remember-me {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-light);
  font-size: 0.9rem;
  cursor: pointer;
  font-weight: 300;
}

.remember-me input {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: var(--accent-gold);
}

.forgot-password {
  color: var(--accent-gold);
  text-decoration: none;
  font-weight: 300;
  font-size: 0.9rem;
}

.login-btn {
  width: 100%;
  padding: 1rem;
  background: var(--primary-blue);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 300;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 1rem;
}

.login-btn:hover {
  background: var(--secondary-blue);
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(26, 75, 140, 0.3);
}

.signup-link {
  text-align: center;
  color: var(--text-light);
  font-size: 0.95rem;
  margin-bottom: 0.75rem;
  font-weight: 300;
}

.signup-link a {
  color: var(--accent-gold);
  text-decoration: none;
  font-weight: 300;
}

.footer-text {
  text-align: center;
  margin-top: 1.25rem;
  font-size: 0.8rem;
  color: var(--text-light);
  font-weight: 300;
}

/* POSITIONING: Large screens (laptop/desktop) */
@media (min-width: 1024px) {
  .login-container {
    padding: 2rem;
  }

  .login-card {
    max-width: 500px;
    padding: 2.5rem 2.2rem;
    max-height: 85vh;
  }
  
  .logo-section {
    margin-bottom: 2rem;
  }
  
  .logo-section img {
    width: 80px;
    height: 80px;
  }
}

/* POSITIONING: Tablet screens */
@media (min-width: 768px) and (max-width: 1023px) {
  .login-container {
    padding: 1.5rem;
  }
  
  .login-card {
    max-width: 450px;
    padding: 2rem 2rem;
    max-height: 90vh;
  }
}

/* POSITIONING: Phone screens - perfect fit without overflow */
@media (max-width: 480px) {
  .login-container {
    padding: 0.5rem;
  }

  .login-card {
    max-width: 100%;
    padding: 1.5rem 1.25rem;
    border-radius: 24px;
    max-height: 96vh;
  }

  .logo-section {
    margin-bottom: 1.25rem;
  }

  .logo-section img {
    width: 55px;
    height: 55px;
    margin-bottom: 0.75rem;
  }

  .logo-section h1 {
    font-size: 1.5rem;
  }
  
  .logo-section p {
    font-size: 0.85rem;
  }

  .form-group {
    margin-bottom: 1rem;
  }
  
  .form-group label {
    font-size: 0.85rem;
  }
  
  .form-group input {
    padding: 0.7rem 0.9rem;
    font-size: 0.9rem;
  }

  .form-options {
    margin-bottom: 1rem;
  }
  
  .remember-me, .forgot-password {
    font-size: 0.85rem;
  }

  .signup-link {
    margin-bottom: 0.5rem;
    font-size: 0.85rem;
  }

  .footer-text {
    margin-top: 1rem;
    font-size: 0.7rem;
  }
}

/* Extra small phones (up to 380px) */
@media (max-width: 380px) {
  .login-container {
    padding: 0.25rem;
  }
  
  .login-card {
    padding: 1rem 1rem;
    max-height: 98vh;
    border-radius: 20px;
  }
  
  .logo-section img {
    width: 48px;
    height: 48px;
  }
  
  .logo-section h1 {
    font-size: 1.3rem;
  }
  
  .form-options {
    flex-direction: column;
    align-items: flex-start;
    gap: 0.6rem;
  }
}

/* POSITIONING: Very small heights (phones landscape) */
@media (max-height: 650px) and (max-width: 800px) {
  body {
    position: relative;
    overflow: auto;
  }
  
  .login-container {
    padding: 0.5rem;
    align-items: flex-start;
  }
  
  .login-card {
    padding: 1rem 1.25rem;
    max-height: 98vh;
  }

  .logo-section {
    margin-bottom: 0.75rem;
  }

  .logo-section img {
    width: 45px;
    height: 45px;
    margin-bottom: 0.5rem;
  }

  .logo-section h1 {
    font-size: 1.3rem;
    margin-bottom: 0.1rem;
  }
  
  .logo-section p {
    font-size: 0.75rem;
  }

  .form-group {
    margin-bottom: 0.75rem;
  }
  
  .form-group input {
    padding: 0.6rem 0.8rem;
  }

  .form-options {
    margin-bottom: 0.75rem;
  }
  
  .login-btn {
    padding: 0.7rem;
    margin-bottom: 0.5rem;
  }
  
  .footer-text {
    margin-top: 0.8rem;
  }
}
</style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <img src="logo.jpg" alt="KIBU Logo">
                <h1>Welcome Back</h1>
                <p>Login to access your <span>voting dashboard</span></p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>KIBU Registration Number</label>
                    <input type="text" id="regNumber" placeholder="e.g., BIT/0025/23" required>
                    <small class="input-hint">Format: COURSE/YYYY/YY (e.g., BIT/0025/23)</small>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Password">
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="ri-eye-off-line"></i>
                        </button>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" checked> Remember me for 30 days
                    </label>
                    <a href="#" class="forgot-password" id="forgotPasswordLink">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
                <div class="signup-link">Don't have an account? <a href="signup.html">Sign Up</a></div>
            </form>
            <div class="footer-text">2026 KIBU eVote. All rights reserved.</div>
        </div>
    </div>
    <script src="./js/api.js"></script>
    <script>
        function togglePassword() {
            const passwordField = document.getElementById('password');
            const icon = document.querySelector('.password-toggle i');
            
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                icon.className = 'ri-eye-line';
            } else {
                passwordField.type = 'password';
                icon.className = 'ri-eye-off-line';
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            let regNumber = document.getElementById('regNumber').value.trim().toUpperCase();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            if (regNumber.length < 5 || !regNumber.includes('/')) { 
                alert('Please enter a valid registration number (e.g., BIT/0025/23)'); 
                return; 
            }
            
            if (!password) {
                alert('Please enter your password');
                return;
            }
            
            const submitBtn = this.querySelector('.login-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Logging in...';
            submitBtn.disabled = true;
            
            try {
                const result = await API.login(regNumber, password, rememberMe);
                sessionStorage.setItem('userName', result.data.fullName);
                sessionStorage.setItem('regNumber', result.data.regNumber);
                sessionStorage.setItem('userId', result.data._id);
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'dashboard.html';
            } catch (error) { 
                alert('Login failed: ' + error.message);
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
        
        // Forgot password handler
        document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'forgot-password.html';
        });
    </script>
</body>
</html>
