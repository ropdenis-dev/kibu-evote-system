<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIBU eVote - Election Results</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/results.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .results-container {
            max-width: 1200px;
            margin: 1rem auto;
            padding: 1rem;
        }
        
        .results-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .results-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .election-selector {
            background: linear-gradient(145deg, #f8fcff, #f0f7ff);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
            text-align: center;
        }
        .election-dropdown {
            padding: 0.6rem 1rem;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 0.9rem;
            min-width: 250px;
            margin-top: 0.5rem;
            cursor: pointer;
        }
        
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .stat-box {
            background: white;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0a2c4e;
        }
        
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .chart-title {
            font-size: 1rem;
            font-weight: 700;
            color: #0a2c4e;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .turnout-chart-container {
            width: 100%;
            height: 300px;
            position: relative;
        }
        
        .pie-chart-container {
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }
        
        .legend-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin: 0.2rem;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            background: #f5f5f5;
            border-radius: 20px;
        }
        
        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .winners-section {
            background: linear-gradient(135deg, #f5f7fa, #eef2f7);
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 2px solid #f5b342;
        }
        
        .winners-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .winners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.8rem;
        }
        
        .winner-card {
            background: white;
            border-radius: 10px;
            padding: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .winner-icon { font-size: 1.5rem; }
        .winner-info { flex: 1; }
        .winner-position { font-size: 0.7rem; color: #666; }
        .winner-name { font-size: 0.9rem; font-weight: 700; color: #0a2c4e; }
        .winner-votes { font-size: 0.8rem; color: #f5b342; }
        .winner-badge { background: #f5b342; padding: 0.2rem 0.5rem; border-radius: 15px; font-size: 0.7rem; font-weight: 700; }
        
        .position-results {
            background: white;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .position-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid #f5b342;
        }
        
        .position-title {
            font-size: 1rem;
            font-weight: 700;
            color: #0a2c4e;
        }
        
        .position-stats {
            font-size: 0.7rem;
            color: #666;
        }
        
        .candidate-result {
            display: flex;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .candidate-rank {
            width: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #999;
        }
        
        .candidate-info {
            flex: 2;
            min-width: 150px;
        }
        
        .candidate-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #0a2c4e;
        }
        
        .candidate-reg {
            font-size: 0.7rem;
            color: #999;
            font-family: monospace;
        }
        
        .vote-count {
            width: 60px;
            text-align: right;
            font-size: 0.85rem;
            font-weight: 700;
        }
        
        .vote-percentage {
            width: 50px;
            text-align: right;
            font-size: 0.8rem;
            color: #666;
        }
        
        .vote-bar-container {
            flex: 2;
            min-width: 120px;
        }
        
        .vote-bar {
            height: 20px;
            background: #eef2f7;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f5b342, #f7c35c);
            transition: width 0.5s;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 5px;
            color: #0a2c4e;
            font-weight: 600;
        }
        
        .winner-row {
            background: #fff9f0;
            border-left: 3px solid #f5b342;
        }
        
        .zero-votes {
            opacity: 0.6;
        }
        
        .loading, .error {
            text-align: center;
            padding: 2rem;
        }
        
        .refresh-btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #f5b342;
            color: #0a2c4e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .no-data {
            text-align: center;
            padding: 3rem;
            color: #999;
        }
        
        @media (max-width: 768px) {
            .stats-overview { grid-template-columns: repeat(2, 1fr); }
            .candidate-result { flex-direction: column; align-items: flex-start; }
            .vote-bar-container { width: 100%; }
            .turnout-chart-container { height: 250px; }
        }
    </style>
</head>
<body>
    <div class="results-container">
        <div class="results-header">
            <h1>🗳️ Election Results</h1>
            <p>Live results from blockchain</p>
        </div>
        
        <div class="election-selector">
            <label style="font-weight:600;">📋 Select Election:</label>
            <select id="electionSelect" class="election-dropdown" onchange="switchElection()">
                <option value="">Loading elections...</option>
            </select>
        </div>
        
        <div class="stats-overview">
            <div class="stat-box"><div class="stat-value" id="totalVotes">0</div><div>Total Votes</div></div>
            <div class="stat-box"><div class="stat-value" id="turnout">0%</div><div>Turnout</div></div>
            <div class="stat-box"><div class="stat-value" id="totalPositions">0</div><div>Positions</div></div>
            <div class="stat-box"><div class="stat-value" id="lastUpdate">--</div><div>Last Update</div></div>
        </div>
        
        <div class="chart-card">
            <div class="chart-title">📈 Voter Turnout Over Time</div>
            <div class="turnout-chart-container"><canvas id="turnoutChart"></canvas></div>
        </div>
        
        <div class="chart-card">
            <div class="chart-title">📊 Votes by Faculty</div>
            <div class="pie-chart-container"><canvas id="facultyPieChart"></canvas></div>
            <div id="facultyLegend" class="legend-container"></div>
        </div>
        
        <div class="winners-section" id="winnersSection" style="display: none;">
            <div class="winners-title">🏆 WINNERS 🏆</div>
            <div class="winners-grid" id="winnersGrid"></div>
        </div>
        
        <div id="resultsList"><div class="loading">Loading results from blockchain...</div></div>
        
        <div style="text-align: center; margin-top: 1rem;">
            <button onclick="refreshAllData()" class="refresh-btn">🔄 Refresh Results</button>
        </div>
    </div>

    <div onclick="goToDashboard()" style="position:fixed;bottom:20px;left:20px;background:#0a2c4e;color:white;padding:8px 16px;border-radius:50px;cursor:pointer;z-index:9999;display:flex;align-items:center;gap:5px;font-size:0.9rem;"> 
        <span>◀◀</span> Dashboard
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <script>
        const API_BASE = 'https://kibu-evote-backend.onrender.com/api/v1';
        let facultyChart = null;
        let turnoutChart = null;
        let allElections = [];
        let currentElection = null;
        let currentPositions = [];
        
        function getFacultyFromRegNumber(regNumber) {
            if (!regNumber) return 'Other';
            const prefix = regNumber.split('/')[0].toUpperCase();
            const faculties = {
                'BIT': 'Computing', 'CSC': 'Computing', 'IT': 'Computing', 'CS': 'Computing',
                'BUS': 'Business', 'ACC': 'Business', 'FIN': 'Business', 'MKT': 'Business', 'BBA': 'Business',
                'LAW': 'Law', 'EDU': 'Education',
                'NUR': 'Health Sciences', 'PHS': 'Health Sciences', 'MED': 'Health Sciences',
                'ECO': 'Humanities', 'HIS': 'Humanities', 'LIT': 'Humanities', 'POL': 'Humanities',
                'SOC': 'Humanities', 'PSY': 'Humanities', 'SWK': 'Humanities', 'CRM': 'Humanities', 'LIB': 'Humanities',
                'PHD': 'Postgraduate', 'MAST': 'Postgraduate'
            };
            return faculties[prefix] || 'Other';
        }
        
        function saveSelectedElection(electionId) {
            if (electionId) sessionStorage.setItem('resultsSelectedElectionId', electionId);
        }
        
        function getSavedSelectedElection() {
            return sessionStorage.getItem('resultsSelectedElectionId');
        }
        
        async function loadElections() {
            try {
                const response = await fetch(`${API_BASE}/elections`);
                const data = await response.json();
                allElections = data.data || [];
                
                const select = document.getElementById('electionSelect');
                select.innerHTML = '<option value="">-- Select an election --</option>';
                
                allElections.forEach(election => {
                    const statusText = election.status === 'active' ? '🟢 Active' : '🔴 Ended';
                    select.innerHTML += `<option value="${election._id}">${election.title} (${statusText})</option>`;
                });
                
                let savedElectionId = getSavedSelectedElection();
                if (!savedElectionId) savedElectionId = sessionStorage.getItem('selectedElectionId');
                
                if (savedElectionId && allElections.find(e => e._id == savedElectionId)) {
                    select.value = savedElectionId;
                    currentElection = allElections.find(e => e._id == savedElectionId);
                    saveSelectedElection(savedElectionId);
                    await loadResultsForElection(savedElectionId);
                } else if (allElections.length > 0) {
                    select.value = allElections[0]._id;
                    currentElection = allElections[0];
                    saveSelectedElection(allElections[0]._id);
                    await loadResultsForElection(allElections[0]._id);
                }
            } catch (error) {
                console.error('Error loading elections:', error);
            }
        }
        
        async function switchElection() {
            const select = document.getElementById('electionSelect');
            const electionId = select.value;
            if (!electionId) return;
            currentElection = allElections.find(e => e._id == electionId);
            saveSelectedElection(electionId);
            await loadResultsForElection(electionId);
        }
        
        async function loadTurnoutChart(votesByDate = {}) {
            try {
                const labels = [];
                const dailyVotes = [];
                const today = new Date();
                for (let i = 6; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(today.getDate() - i);
                    labels.push(`${date.getMonth()+1}/${date.getDate()}`);
                    dailyVotes.push(votesByDate[labels[labels.length-1]] || 0);
                }
                
                const cumulativeVotes = [];
                let sum = 0;
                for (let i = 0; i < dailyVotes.length; i++) { sum += dailyVotes[i]; cumulativeVotes.push(sum); }
                
                const ctx = document.getElementById('turnoutChart').getContext('2d');
                if (turnoutChart) turnoutChart.destroy();
                turnoutChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels, datasets: [
                        { label: 'Daily Votes', data: dailyVotes, borderColor: '#36A2EB', backgroundColor: 'rgba(54,162,235,0.1)', fill: true, tension: 0.4 },
                        { label: 'Cumulative Votes', data: cumulativeVotes, borderColor: '#f5b342', backgroundColor: 'rgba(245,179,66,0.1)', borderWidth: 3, pointRadius: 3, fill: true, tension: 0.4 }
                    ]},
                    options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } }, scales: { y: { beginAtZero: true, title: { display: true, text: 'Number of Votes' } } } }
                });
            } catch (error) { console.error('Chart error:', error); }
        }
        
        async function loadFacultyChart(votesByFaculty = {}) {
            try {
                const labels = Object.keys(votesByFaculty);
                const values = Object.values(votesByFaculty);
                const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#00A86B'];
                const ctx = document.getElementById('facultyPieChart').getContext('2d');
                if (facultyChart) facultyChart.destroy();
                
                if (labels.length === 0) {
                    document.getElementById('facultyLegend').innerHTML = '<div style="text-align:center;padding:1rem;">No vote data available</div>';
                    return;
                }
                
                facultyChart = new Chart(ctx, { type: 'pie', data: { labels, datasets: [{ data: values, backgroundColor: colors.slice(0, labels.length), borderWidth: 2 }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } } } });
                
                const total = values.reduce((a,b) => a+b, 0);
                let legendHtml = '';
                labels.forEach((label, index) => {
                    const percentage = total > 0 ? ((values[index] / total) * 100).toFixed(1) : 0;
                    legendHtml += `<div class="legend-item"><div class="legend-color" style="background: ${colors[index % colors.length]}"></div><span>${label}: ${values[index]} (${percentage}%)</span></div>`;
                });
                document.getElementById('facultyLegend').innerHTML = legendHtml;
            } catch (error) { console.error('Faculty chart error:', error); }
        }
        
        async function loadResultsForElection(electionId) {
            const resultsList = document.getElementById('resultsList');
            const winnersGrid = document.getElementById('winnersGrid');
            const winnersSection = document.getElementById('winnersSection');
            resultsList.innerHTML = '<div class="loading">📡 Loading results...</div>';
            
            try {
                const positionsRes = await fetch(`${API_BASE}/positions/election/${electionId}`);
                const positionsData = await positionsRes.json();
                currentPositions = positionsData.data || [];
                if (currentElection && currentElection.positions && currentPositions.length === 0) currentPositions = currentElection.positions;
                const sortedPositions = [...currentPositions].sort((a,b) => (a.positionId || a.order || 0) - (b.positionId || b.order || 0));
                document.getElementById('totalPositions').textContent = sortedPositions.length;
                
                const candidatesRes = await fetch(`${API_BASE}/candidates/election/${electionId}`);
                const candidatesData = await candidatesRes.json();
                const allCandidates = candidatesData.data || [];
                
                let totalVotes = 0;
                const voteCounts = {};
                const votesByDate = {};
                const votesByFaculty = {};
                
                sortedPositions.forEach(pos => {
                    voteCounts[pos.title] = {};
                    allCandidates.filter(c => c.positionTitle === pos.title).forEach(candidate => { voteCounts[pos.title][candidate.name] = 0; });
                });
                
                // Get votes from backend
                try {
                    const votesRes = await fetch(`https://kibu-evote-backend.onrender.com/api/results`);
                    const votesData = await votesRes.json();
                    if (votesData.success && votesData.results) {
                        for (const [position, candidates] of Object.entries(votesData.results)) {
                            if (voteCounts[position]) {
                                for (const [candidateName, voteInfo] of Object.entries(candidates)) {
                                    const voteCount = typeof voteInfo === 'object' ? voteInfo.votes : voteInfo;
                                    if (voteCounts[position][candidateName] !== undefined) {
                                        voteCounts[position][candidateName] = voteCount;
                                        totalVotes += voteCount;
                                    }
                                }
                            }
                        }
                    }
                } catch(e) { console.log('Backend votes not available:', e); }
                
                // Get votes from localStorage for charts
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('vote_')) {
                        try {
                            const voteData = JSON.parse(localStorage.getItem(key));
                            if (voteData && voteData.votes) {
                                if (voteData.timestamp) {
                                    const voteDate = new Date(voteData.timestamp);
                                    const dateStr = `${voteDate.getMonth()+1}/${voteDate.getDate()}`;
                                    votesByDate[dateStr] = (votesByDate[dateStr] || 0) + 1;
                                }
                                const faculty = getFacultyFromRegNumber(voteData.voterRegNumber || voteData.regNumber || '');
                                votesByFaculty[faculty] = (votesByFaculty[faculty] || 0) + 1;
                                if (totalVotes === 0) {
                                    for (const [position, candidateName] of Object.entries(voteData.votes)) {
                                        if (voteCounts[position] && voteCounts[position][candidateName] !== undefined) {
                                            voteCounts[position][candidateName]++;
                                            totalVotes++;
                                        }
                                    }
                                }
                            }
                        } catch(e) {}
                    }
                }
                
                document.getElementById('totalVotes').textContent = totalVotes;
                const turnout = currentElection?.totalVoters ? Math.round((totalVotes / currentElection.totalVoters) * 100) : (totalVotes > 0 ? Math.min(100, Math.round((totalVotes / 100) * 100)) : 0);
                document.getElementById('turnout').textContent = turnout + '%';
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                
                loadTurnoutChart(votesByDate);
                loadFacultyChart(votesByFaculty);
                
                if (totalVotes === 0) {
                    resultsList.innerHTML = '<div class="no-data"><h3>🗳️ No Votes Cast Yet</h3><p>Be the first to vote!</p><a href="voting.html" class="refresh-btn" style="display:inline-block; text-decoration:none;">Go Vote Now</a></div>';
                    winnersSection.style.display = 'none';
                    return;
                }
                
                // Build winners
                const winners = [];
                for (const position of sortedPositions) {
                    const candidates = voteCounts[position.title] || {};
                    const sorted = Object.entries(candidates).sort((a,b) => b[1] - a[1]);
                    if (sorted.length > 0 && sorted[0][1] > 0) {
                        winners.push({ position: position.title, name: sorted[0][0], votes: sorted[0][1], percentage: ((sorted[0][1] / totalVotes) * 100).toFixed(1) });
                    }
                }
                
                if (winners.length > 0) {
                    winnersSection.style.display = 'block';
                    winnersGrid.innerHTML = '';
                    winners.forEach(winner => {
                        winnersGrid.innerHTML += `<div class="winner-card"><div class="winner-icon">🏆</div><div class="winner-info"><div class="winner-position">${winner.position}</div><div class="winner-name">${winner.name}</div><div class="winner-votes">${winner.votes} votes (${winner.percentage}%)</div></div><div class="winner-badge">WINNER</div></div>`;
                    });
                } else { winnersSection.style.display = 'none'; }
                
                // Display all positions with vote distribution
                resultsList.innerHTML = '';
                for (const position of sortedPositions) {
                    const positionTitle = position.title;
                    const positionCandidates = allCandidates.filter(c => c.positionTitle === positionTitle);
                    let positionTotalVotes = 0;
                    const candidatesWithVotes = positionCandidates.map(candidate => {
                        const votes = voteCounts[positionTitle]?.[candidate.name] || 0;
                        positionTotalVotes += votes;
                        return { name: candidate.name, regNumber: candidate.regNumber || 'N/A', course: candidate.course || 'N/A', votes: votes, percentageOfPosition: 0 };
                    }).sort((a,b) => b.votes - a.votes);
                    candidatesWithVotes.forEach(c => { c.percentageOfPosition = positionTotalVotes > 0 ? (c.votes / positionTotalVotes) * 100 : 0; });
                    
                    const winner = candidatesWithVotes[0];
                    let html = `<div class="position-results"><div class="position-header"><div class="position-title">${positionTitle}</div><div class="position-stats">${positionTotalVotes} total votes | ${candidatesWithVotes.length} candidates</div></div><div style="background:#f0f9ff;border-radius:8px;padding:0.4rem 0.8rem;margin-bottom:0.8rem;font-size:0.8rem;">⭐ WINNER: ${winner?.name || 'No votes'} (${winner?.votes || 0} votes)</div>`;
                    
                    candidatesWithVotes.forEach((candidate, index) => {
                        const isWinner = index === 0 && candidate.votes > 0;
                        const barWidth = Math.min(candidate.percentageOfPosition, 100);
                        html += `<div class="candidate-result ${isWinner ? 'winner-row' : ''}"><div class="candidate-rank">#${index+1}</div><div class="candidate-info"><div class="candidate-name">${candidate.name} ${isWinner ? '👑' : ''}</div><div class="candidate-reg">${candidate.regNumber} | ${candidate.course}</div></div><div class="vote-count">${candidate.votes} votes</div><div class="vote-percentage">${candidate.percentageOfPosition.toFixed(1)}%</div><div class="vote-bar-container"><div class="vote-bar"><div class="bar-fill" style="width: ${barWidth}%;">${barWidth > 15 ? Math.round(barWidth) + '%' : ''}</div></div></div></div>`;
                    });
                    html += `</div>`;
                    resultsList.innerHTML += html;
                }
            } catch (error) {
                console.error('Error:', error);
                resultsList.innerHTML = `<div class="error">❌ Error loading results: ${error.message}<br><br><button onclick="refreshAllData()" class="refresh-btn">Try Again</button></div>`;
            }
        }
        
        async function refreshAllData() {
            const select = document.getElementById('electionSelect');
            const electionId = select.value;
            if (electionId) {
                currentElection = allElections.find(e => e._id == electionId);
                await loadResultsForElection(electionId);
            }
        }
        
        function goToDashboard() { window.location.href = 'dashboard.html'; }
        
        document.addEventListener('DOMContentLoaded', function() { loadElections(); });
    </script>
</body>
</html>
