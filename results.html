<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIBU eVote - Election Results</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/results.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .results-container {
            max-width: 1200px;
            margin: 1rem auto;
            padding: 1rem;
        }
        
        .results-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .results-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .stats-overview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .stat-box {
            background: white;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .chart-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .turnout-chart-container {
            width: 100%;
            height: 300px;
            position: relative;
        }
        
        .pie-chart-container {
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }
        
        .legend-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin: 0.2rem;
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            background: #f5f5f5;
            border-radius: 20px;
        }
        
        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        .winners-section {
            background: linear-gradient(135deg, #f5f7fa, #eef2f7);
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 2px solid var(--accent-gold);
        }
        
        .winners-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .winners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.8rem;
        }
        
        .winner-card {
            background: white;
            border-radius: 10px;
            padding: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .winner-icon { font-size: 1.5rem; }
        .winner-info { flex: 1; }
        .winner-position { font-size: 0.7rem; color: #666; }
        .winner-name { font-size: 0.9rem; font-weight: 700; color: var(--primary-blue); }
        .winner-votes { font-size: 0.8rem; color: var(--accent-gold); }
        .winner-badge { background: var(--accent-gold); padding: 0.2rem 0.5rem; border-radius: 15px; font-size: 0.7rem; font-weight: 700; }
        
        .position-results {
            background: white;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .position-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid var(--accent-gold);
        }
        
        .position-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-blue);
        }
        
        .candidate-result {
            display: flex;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid #eee;
            gap: 0.5rem;
        }
        
        .candidate-rank {
            width: 30px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #999;
        }
        
        .candidate-name {
            flex: 2;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-blue);
        }
        
        .vote-count {
            width: 60px;
            text-align: right;
            font-size: 0.85rem;
            font-weight: 700;
        }
        
        .vote-percentage {
            width: 50px;
            text-align: right;
            font-size: 0.8rem;
            color: #666;
        }
        
        .vote-bar-container {
            flex: 2;
        }
        
        .vote-bar {
            height: 20px;
            background: #eef2f7;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold), #f7c35c);
            transition: width 0.5s;
        }
        
        .winner-row {
            background: #fff9f0;
            border-left: 3px solid var(--accent-gold);
        }
        
        .loading, .error {
            text-align: center;
            padding: 2rem;
        }
        
        .refresh-btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: var(--accent-gold);
            color: var(--primary-blue);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .no-data {
            text-align: center;
            padding: 3rem;
            color: #999;
        }
        
        @media (max-width: 768px) {
            .stats-overview { grid-template-columns: repeat(2, 1fr); }
            .candidate-result { flex-wrap: wrap; }
            .vote-bar-container { flex: 100%; margin-top: 0.3rem; }
            .turnout-chart-container { height: 250px; }
        }
    </style>
</head>
<body>
    <div class="results-container">
        <div class="results-header">
            <h1>📊 Election Results</h1>
            <p>Live results from cast votes</p>
        </div>
        
        <div class="stats-overview">
            <div class="stat-box">
                <div class="stat-value" id="totalVotes">0</div>
                <div>Total Votes</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="turnout">0%</div>
                <div>Turnout</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="totalPositions">0</div>
                <div>Positions</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="lastUpdate">--</div>
                <div>Last Update</div>
            </div>
        </div>
        
        <!-- VOTER TURNOUT OVER TIME CHART -->
        <div class="chart-card">
            <div class="chart-title">📈 Voter Turnout Over Time</div>
            <div class="turnout-chart-container">
                <canvas id="turnoutChart"></canvas>
            </div>
        </div>
        
        <!-- FACULTY PIE CHART -->
        <div class="chart-card">
            <div class="chart-title">📊 Votes by Faculty</div>
            <div class="pie-chart-container">
                <canvas id="facultyPieChart"></canvas>
            </div>
            <div id="facultyLegend" class="legend-container"></div>
        </div>
        
        <!-- WINNERS SECTION -->
        <div class="winners-section" id="winnersSection" style="display: none;">
            <div class="winners-title">🏆 WINNERS 🏆</div>
            <div class="winners-grid" id="winnersGrid"></div>
        </div>
        
        <div id="resultsList">
            <div class="loading">Loading results...</div>
        </div>
        
        <div style="text-align: center; margin-top: 1rem;">
            <button onclick="refreshAllData()" class="refresh-btn">🔄 Refresh Results</button>
        </div>
    </div>

    <script>
        let facultyChart = null;
        let turnoutChart = null;
        
        function getFacultyFromRegNumber(regNumber) {
            if (!regNumber) return 'Other';
            const prefix = regNumber.split('/')[0].toUpperCase();
            if (prefix === 'BIT' || prefix === 'CSC' || prefix === 'IT' || prefix === 'CS') return 'Computing';
            if (prefix === 'BUS' || prefix === 'ACC' || prefix === 'FIN' || prefix === 'MKT' || prefix === 'BBA') return 'Business';
            if (prefix === 'LAW') return 'Law';
            if (prefix === 'EDU') return 'Education';
            if (prefix === 'NUR' || prefix === 'PHS' || prefix === 'MED') return 'Health Sciences';
            if (prefix === 'ECO' || prefix === 'HIS' || prefix === 'LIT' || prefix === 'POL' || prefix === 'SOC' || prefix === 'PSY' || prefix === 'SWK' || prefix === 'CRM' || prefix === 'LIB') return 'Humanities';
            if (prefix === 'PHD' || prefix === 'MAST') return 'Postgraduate';
            return 'Other';
        }
        
        async function loadTurnoutChart() {
            try {
                // Get all votes from localStorage
                let allVotes = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('vote_')) {
                        try {
                            const voteData = JSON.parse(localStorage.getItem(key));
                            if (voteData && voteData.timestamp) {
                                allVotes.push(voteData);
                            }
                        } catch(e) {}
                    }
                }
                
                // Create last 7 days labels
                const labels = [];
                const dailyVotes = [];
                const today = new Date();
                
                for (let i = 6; i >= 0; i--) {
                    const date = new Date(today);
                    date.setDate(today.getDate() - i);
                    labels.push(`Day ${7 - i}\n${date.getMonth()+1}/${date.getDate()}`);
                    dailyVotes.push(0);
                }
                
                // Count votes per day
                allVotes.forEach(vote => {
                    const voteDate = new Date(vote.timestamp);
                    const daysAgo = Math.floor((today - voteDate) / (1000 * 60 * 60 * 24));
                    if (daysAgo >= 0 && daysAgo < 7) {
                        dailyVotes[6 - daysAgo]++;
                    }
                });
                
                // Cumulative votes
                const cumulativeVotes = [];
                let sum = 0;
                for (let i = 0; i < dailyVotes.length; i++) {
                    sum += dailyVotes[i];
                    cumulativeVotes.push(sum);
                }
                
                const ctx = document.getElementById('turnoutChart').getContext('2d');
                if (turnoutChart) turnoutChart.destroy();
                
                turnoutChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            {
                                label: 'Daily Votes',
                                data: dailyVotes,
                                borderColor: '#36A2EB',
                                backgroundColor: 'rgba(54, 162, 235, 0.1)',
                                fill: true,
                                tension: 0.4
                            },
                            {
                                label: 'Cumulative Votes',
                                data: cumulativeVotes,
                                borderColor: '#f5b342',
                                backgroundColor: 'rgba(245, 179, 66, 0.1)',
                                fill: true,
                                tension: 0.4
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                title: { display: true, text: 'Number of Votes' }
                            }
                        }
                    }
                });
                
            } catch (error) {
                console.error('Chart error:', error);
            }
        }
        
        async function loadFacultyChart() {
            try {
                let allVotes = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('vote_')) {
                        try {
                            const voteData = JSON.parse(localStorage.getItem(key));
                            if (voteData && (voteData.voterRegNumber || voteData.regNumber)) {
                                allVotes.push(voteData);
                            }
                        } catch(e) {}
                    }
                }
                
                if (allVotes.length === 0) {
                    document.getElementById('facultyLegend').innerHTML = '<div style="text-align:center;padding:1rem;">No votes cast yet</div>';
                    return;
                }
                
                const facultyCounts = {};
                allVotes.forEach(vote => {
                    const regNumber = vote.voterRegNumber || vote.regNumber || '';
                    const faculty = getFacultyFromRegNumber(regNumber);
                    facultyCounts[faculty] = (facultyCounts[faculty] || 0) + 1;
                });
                
                const labels = Object.keys(facultyCounts);
                const values = Object.values(facultyCounts);
                const colors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'];
                
                if (facultyChart) facultyChart.destroy();
                
                const ctx = document.getElementById('facultyPieChart').getContext('2d');
                facultyChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: colors.slice(0, labels.length),
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } }
                    }
                });
                
                const total = values.reduce((a, b) => a + b, 0);
                let legendHtml = '';
                labels.forEach((label, index) => {
                    const percentage = ((values[index] / total) * 100).toFixed(1);
                    legendHtml += `<div class="legend-item"><div class="legend-color" style="background: ${colors[index % colors.length]}"></div><span>${label}: ${values[index]} (${percentage}%)</span></div>`;
                });
                document.getElementById('facultyLegend').innerHTML = legendHtml;
                
            } catch (error) {
                console.error('Chart error:', error);
            }
        }
        
        async function loadResults() {
            const resultsList = document.getElementById('resultsList');
            const winnersGrid = document.getElementById('winnersGrid');
            const winnersSection = document.getElementById('winnersSection');
            
            resultsList.innerHTML = '<div class="loading">Loading results...</div>';
            
            try {
                const elections = JSON.parse(localStorage.getItem('admin_elections') || '[]');
                const activeElection = elections.find(e => e.status === 'active');
                
                if (!activeElection) {
                    resultsList.innerHTML = `<div class="no-data"><h3>No Active Election</h3><p>Please wait for the admin to start an election.</p></div>`;
                    winnersSection.style.display = 'none';
                    return;
                }
                
                const positions = JSON.parse(localStorage.getItem(`admin_positions_${activeElection.id}`) || '[]');
                const sortedPositions = positions.sort((a, b) => a.order - b.order);
                document.getElementById('totalPositions').textContent = sortedPositions.length;
                
                let allVotes = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key && key.startsWith('vote_')) {
                        try {
                            const voteData = JSON.parse(localStorage.getItem(key));
                            if (voteData && voteData.votes) {
                                allVotes.push(voteData);
                            }
                        } catch(e) {}
                    }
                }
                
                const totalVotes = allVotes.length;
                document.getElementById('totalVotes').textContent = totalVotes;
                const turnout = activeElection.totalVoters ? Math.round((totalVotes / activeElection.totalVoters) * 100) : 0;
                document.getElementById('turnout').textContent = turnout + '%';
                document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
                
                if (totalVotes === 0) {
                    resultsList.innerHTML = `<div class="no-data"><h3>No Votes Cast Yet</h3><p>Be the first to vote!</p><a href="voting.html" style="display: inline-block; margin-top: 1rem; padding: 0.8rem 1.5rem; background: var(--accent-gold); color: var(--primary-blue); text-decoration: none; border-radius: 8px;">Go Vote Now</a></div>`;
                    winnersSection.style.display = 'none';
                    return;
                }
                
                const voteCounts = {};
                sortedPositions.forEach(pos => { voteCounts[pos.title] = {}; });
                
                allVotes.forEach(vote => {
                    const userVotes = vote.votes;
                    for (const [position, candidate] of Object.entries(userVotes)) {
                        if (voteCounts[position]) {
                            voteCounts[position][candidate] = (voteCounts[position][candidate] || 0) + 1;
                        }
                    }
                });
                
                const winners = [];
                for (const position of sortedPositions) {
                    const candidates = voteCounts[position.title] || {};
                    const candidateEntries = Object.entries(candidates);
                    if (candidateEntries.length > 0) {
                        const winner = candidateEntries.sort((a, b) => b[1] - a[1])[0];
                        winners.push({ position: position.title, name: winner[0], votes: winner[1], percentage: ((winner[1] / totalVotes) * 100).toFixed(1) });
                    } else {
                        winners.push({ position: position.title, name: 'No votes yet', votes: 0, percentage: 0 });
                    }
                }
                
                if (winners.length > 0 && winners.some(w => w.votes > 0)) {
                    winnersSection.style.display = 'block';
                    winnersGrid.innerHTML = '';
                    winners.forEach(winner => {
                        winnersGrid.innerHTML += `<div class="winner-card"><div class="winner-icon">${winner.votes > 0 ? '🏆' : '⏳'}</div><div class="winner-info"><div class="winner-position">${winner.position}</div><div class="winner-name">${winner.name}</div><div class="winner-votes">${winner.votes} votes (${winner.percentage}%)</div></div><div class="winner-badge">${winner.votes > 0 ? 'WINNER' : 'PENDING'}</div></div>`;
                    });
                } else {
                    winnersSection.style.display = 'none';
                }
                
                resultsList.innerHTML = '';
                for (const position of sortedPositions) {
                    const candidates = voteCounts[position.title] || {};
                    const candidateEntries = Object.entries(candidates);
                    
                    if (candidateEntries.length === 0) {
                        resultsList.innerHTML += `<div class="position-results"><div class="position-header"><div class="position-title">${position.title}</div><div class="position-stats">No votes yet</div></div><div style="text-align:center;padding:1rem;color:#999;">No votes cast for this position</div></div>`;
                        continue;
                    }
                    
                    const sortedCandidates = candidateEntries.sort((a, b) => b[1] - a[1]);
                    const winner = sortedCandidates[0];
                    
                    let html = `<div class="position-results"><div class="position-header"><div class="position-title">${position.title}</div><div class="position-stats">${sortedCandidates.reduce((sum, c) => sum + c[1], 0)} total votes</div></div><div style="background:#f0f9ff;border-radius:8px;padding:0.4rem 0.8rem;margin-bottom:0.8rem;font-size:0.8rem;">🏆 LEADER: ${winner[0]} (${winner[1]} votes)</div>`;
                    
                    sortedCandidates.forEach(([candidateName, voteCount], index) => {
                        const percentage = (voteCount / totalVotes) * 100;
                        html += `<div class="candidate-result ${index === 0 ? 'winner-row' : ''}"><div class="candidate-rank">#${index + 1}</div><div class="candidate-name">${candidateName} ${index === 0 ? '👑' : ''}</div><div class="vote-count">${voteCount}</div><div class="vote-percentage">${percentage.toFixed(1)}%</div><div class="vote-bar-container"><div class="vote-bar"><div class="bar-fill" style="width: ${percentage}%;"></div></div></div></div>`;
                    });
                    html += `</div>`;
                    resultsList.innerHTML += html;
                }
                
            } catch (error) {
                console.error('Error:', error);
                resultsList.innerHTML = `<div class="error">Error loading results: ${error.message}</div>`;
            }
        }
        
        function refreshAllData() {
            loadResults();
            loadFacultyChart();
            loadTurnoutChart();
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadResults();
            loadFacultyChart();
            loadTurnoutChart();
        });
    </script>
    
    <script src="./js/features.js"></script>
    <script src="./js/api.js"></script>
    
    <div onclick="goToDashboard()" style="position:fixed;bottom:20px;left:20px;background:#0a2c4e;color:white;padding:8px 16px;border-radius:50px;cursor:pointer;z-index:9999;display:flex;align-items:center;gap:5px;font-size:0.9rem;"> 
        <span>🏠</span> Dashboard
    </div>

    <script>
    function goToDashboard() {
        window.location.href = 'dashboard.html';
    }
    </script>
</body>
</html>
