<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIBU eVote | My Votes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0a2c4e;
            --secondary-blue: #1e4a7a;
            --light-blue: #eef5ff;
            --accent-gold: #f5b342;
            --dark-gold: #d4942c;
            --pure-white: #ffffff;
            --off-white: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --text-lighter: #94a3b8;
            --success-green: #10b981;
            --border-color: #edf2f7;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .verification-container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Navigation */
        .nav-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .nav-logo span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-logo .gold {
            color: var(--accent-gold);
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.2);
        }

        .nav-link.active {
            background: var(--accent-gold);
            color: var(--text-dark);
            font-weight: 600;
        }

        /* Main Card */
        .verification-card {
            background: var(--pure-white);
            border-radius: 40px;
            padding: 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .verification-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent-gold), var(--primary-blue));
        }

        /* Header */
        .verification-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-green);
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .verified-badge .dot {
            width: 10px;
            height: 10px;
            background: var(--success-green);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .verification-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .verification-header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        /* Transaction Info */
        .tx-info {
            background: linear-gradient(145deg, #f8fcff, #f0f7ff);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        .tx-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .tx-hash {
            background: var(--pure-white);
            padding: 1rem;
            border-radius: 16px;
            font-family: monospace;
            font-size: 1rem;
            word-break: break-all;
            color: var(--primary-blue);
            font-weight: 600;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.2rem 0.5rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--light-blue);
            color: var(--primary-blue);
        }

        .tx-meta {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .tx-meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--off-white);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 0.3rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Votes List */
        .votes-section {
            margin-bottom: 2rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .section-title h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .section-title span {
            background: var(--light-blue);
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary-blue);
        }

        .votes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .vote-card {
            background: var(--off-white);
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .vote-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-gold);
        }

        .vote-position {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .vote-position .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-gold);
            border-radius: 50%;
        }

        .vote-candidate {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 0.3rem;
        }

        .vote-candidate.abstain {
            color: var(--text-light);
            font-style: italic;
        }

        .vote-course {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        /* Action Buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: var(--secondary-blue);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -8px var(--primary-blue);
        }

        .btn-secondary {
            background: white;
            color: var(--primary-blue);
            padding: 1rem;
            border: 2px solid var(--primary-blue);
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: var(--light-blue);
        }

        .btn-gold {
            background: var(--accent-gold);
            color: var(--text-dark);
            padding: 1rem;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            grid-column: span 2;
        }

        .btn-gold:hover {
            background: var(--dark-gold);
            transform: translateY(-2px);
        }

        /* No votes state */
        .no-votes {
            text-align: center;
            padding: 3rem;
            background: var(--off-white);
            border-radius: 20px;
            border: 2px dashed var(--border-color);
        }

        .no-votes-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .no-votes h3 {
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .no-votes p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .timestamp {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .verification-card {
                padding: 1.5rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                grid-template-columns: 1fr;
            }
            
            .btn-gold {
                grid-column: span 1;
            }
            
            .nav-bar {
                flex-direction: column;
                gap: 1rem;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="verification-container">
        <!-- Navigation -->
        <nav class="nav-bar">
            <div class="nav-logo">
                <span>KIBU<span class="gold">eVote</span></span>
            </div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="voting.html" class="nav-link">Vote</a>
                <a href="verification.html" class="nav-link active">My Votes</a>
                <a href="results.html" class="nav-link">Results</a>
                <button onclick="logout()" class="nav-link" style="background:none; border:none; cursor:pointer;">🚪 Logout</button>
            </div>
        </nav>

        <!-- Main Card -->
        <div class="verification-card">
            <!-- Header -->
            <div class="verification-header">
                <div class="verified-badge">
                    <span class="dot"></span>
                    <span>Blockchain Verified</span>
                </div>
                <h1>My Votes</h1>
                <p>Your votes are securely recorded on the Sepolia blockchain</p>
            </div>

            <!-- Transaction Info -->
            <div class="tx-info" id="txInfo">
                <!-- Will be populated by JavaScript -->
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <!-- Stats -->
            <div class="stats-grid" id="statsGrid">
                <!-- Will be populated by JavaScript -->
            </div>

            <!-- Votes List -->
            <div class="votes-section">
                <div class="section-title">
                    <h2>Your Selections</h2>
                    <span id="votesCount">0/13</span>
                </div>
                <div class="votes-grid" id="votesGrid">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="dashboard.html" class="btn-secondary">
                    <span>←</span> Back to Dashboard
                </a>
                <a href="results.html" class="btn-primary">
                    View Results <span>→</span>
                </a>
                <button class="btn-gold" onclick="verifyOnEtherscan()">
                    <span>🔍</span> Verify on Blockchain Explorer
                </button>
            </div>

            <!-- Timestamp -->
            <div class="timestamp" id="timestamp"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            displayVotes();
        });

        function displayVotes() {
            // Try to get votes from multiple sources
            let votes = {};
            let txHash = '';
            let timestamp = '';
            
            // Check session storage first (from submission)
            const submittedData = sessionStorage.getItem('submittedVotes');
            if (submittedData) {
                try {
                    const parsed = JSON.parse(submittedData);
                    votes = parsed.votes || parsed;
                    txHash = parsed.txHash || sessionStorage.getItem('lastTxHash') || '0x7a3f8e9d2c1b5a4f8e7d6c5b4a3f2e1d0c9b8a7f';
                    timestamp = parsed.timestamp || new Date().toISOString();
                } catch (e) {
                    console.error('Error parsing submitted votes:', e);
                }
            }
            
            // If no submitted votes, check lastVotes
            if (Object.keys(votes).length === 0) {
                const lastVotes = sessionStorage.getItem('lastVotes');
                if (lastVotes) {
                    try {
                        votes = JSON.parse(lastVotes);
                        txHash = sessionStorage.getItem('lastTxHash') || '0x7a3f8e9d2c1b5a4f8e7d6c5b4a3f2e1d0c9b8a7f';
                    } catch (e) {
                        console.error('Error parsing last votes:', e);
                    }
                }
            }

            // If still no votes, use mock data for demonstration
            if (Object.keys(votes).length === 0) {
                // Mock votes for demonstration
                votes = {
                    'Chairperson': 'Sarah Wanjiku',
                    'Vice Chairperson': 'Peter Omondi',
                    'Secretary General': 'David Mwangi',
                    'Treasurer': 'Michael Odhiambo',
                    'Academic Secretary': 'Brian Kipkoech',
                    'Accommodation & Security Secretary': 'Abstain',
                    'Special Interests Secretary': 'Candidate A',
                    'FASS – Academic Nominee': 'Candidate B',
                    'FASS – Female Nominee': 'Abstain',
                    'FASS – Male Nominee': 'Candidate A',
                    'Evening & Weekend Nominee': 'Candidate B',
                    'Part-Time': 'Abstain',
                    'Postgraduate': 'Candidate A'
                };
                txHash = '0x7a3f8e9d2c1b5a4f8e7d6c5b4a3f2e1d0c9b8a7f';
                timestamp = new Date().toISOString();
                
                // Store for next time
                sessionStorage.setItem('lastVotes', JSON.stringify(votes));
                sessionStorage.setItem('lastTxHash', txHash);
            }

            // Display transaction info
            displayTransactionInfo(txHash, timestamp);
            
            // Display stats
            displayStats(votes);
            
            // Display votes
            displayVotesGrid(votes);
        }

        function displayTransactionInfo(txHash, timestamp) {
            const txInfo = document.getElementById('txInfo');
            const date = timestamp ? new Date(timestamp).toLocaleString() : new Date().toLocaleString();
            
            txInfo.innerHTML = `
                <div class="tx-label">
                    <span>🔗</span>
                    <span>Transaction Hash</span>
                </div>
                <div class="tx-hash">
                    <span>${txHash}</span>
                    <button class="copy-btn" onclick="copyToClipboard('${txHash}')">📋</button>
                </div>
                <div class="tx-meta">
                    <div class="tx-meta-item">
                        <span>⏱️</span>
                        <span>Submitted: ${date}</span>
                    </div>
                    <div class="tx-meta-item">
                        <span>⛓️</span>
                        <span>Network: Sepolia</span>
                    </div>
                    <div class="tx-meta-item">
                        <span>✓</span>
                        <span>Status: Confirmed</span>
                    </div>
                </div>
            `;
            
            document.getElementById('timestamp').innerHTML = `✓ Verified on blockchain • ${date}`;
        }

        function displayStats(votes) {
            const totalPositions = 13;
            const completed = Object.keys(votes).length;
            const percentage = Math.round((completed / totalPositions) * 100);
            
            document.getElementById('votesCount').textContent = `${completed}/${totalPositions}`;
            
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${completed}</div>
                    <div class="stat-label">Positions Voted</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${percentage}%</div>
                    <div class="stat-label">Completion</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${Object.values(votes).filter(v => v !== 'Abstain').length}</div>
                    <div class="stat-label">Candidates Chosen</div>
                </div>
            `;
        }

        function displayVotesGrid(votes) {
            const grid = document.getElementById('votesGrid');
            grid.innerHTML = '';

            // Mock course data for demonstration
            const courseData = {
                'Sarah Wanjiku': 'Business Administration - Year 3',
                'James Kiprotich': 'Computer Science - Year 4',
                'Grace Akinyi': 'Nursing - Year 3',
                'Peter Omondi': 'Law - Year 4',
                'Mary Wangari': 'Education - Year 3',
                'David Mwangi': 'Information Technology - Year 4',
                'Lucy Achieng': 'Journalism - Year 3',
                'Michael Odhiambo': 'Accounting - Year 4',
                'Cynthia Wanjiru': 'Economics - Year 3',
                'Brian Kipkoech': 'Education - Year 4',
                'Faith Chemutai': 'Science - Year 3',
                'Candidate A': 'Various Departments',
                'Candidate B': 'Various Departments'
            };

            for (const [position, candidate] of Object.entries(votes)) {
                const isAbstain = candidate === 'Abstain';
                const course = courseData[candidate] || 'Various Departments';
                
                const card = document.createElement('div');
                card.className = 'vote-card';
                card.innerHTML = `
                    <div class="vote-position">
                        <span class="dot"></span>
                        ${position}
                    </div>
                    <div class="vote-candidate ${isAbstain ? 'abstain' : ''}">
                        ${isAbstain ? '⚪ Abstained' : candidate}
                    </div>
                    ${!isAbstain ? `<div class="vote-course">${course}</div>` : ''}
                `;
                grid.appendChild(card);
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Transaction hash copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy');
            });
        }

        function verifyOnEtherscan() {
            const txHash = sessionStorage.getItem('lastTxHash') || '0x7a3f8e9d2c1b5a4f8e7d6c5b4a3f2e1d0c9b8a7f';
            window.open(`https://sepolia.etherscan.io/tx/${txHash}`, '_blank');
        } 
    async function logout() {
    try { await API.logout(); } catch(e) { console.error(e); }
    sessionStorage.clear();
    window.location.href = '/login.html';
}
    </script>
     <script src="./js/features.js"></script>

     <script src="./js/api.js"></script>
<script>
// Example login form handler
document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const regNumber = document.getElementById('regNumber').value;
  const password = document.getElementById('password').value;
  
  try {
    const result = await API.login(regNumber, password, false);
    window.location.href = 'dashboard.html';
  } catch (error) {
    alert('Login failed: ' + error.message);
  }
});
</script>
</body>
</html>
