<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIBU eVote | My Votes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{--primary-blue:#0a2c4e;--secondary-blue:#1e4a7a;--accent-gold:#f5b342;--success-green:#10b981;--pure-white:#ffffff;--off-white:#f8fafc;--text-dark:#1e293b;--text-light:#64748b;--border-color:#e2e8f0;}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:2rem;}
        .container{max-width:1000px;margin:0 auto;}
        
        /* Navigation */
        .nav-bar{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:60px;padding:1rem 2rem;margin-bottom:2rem;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(255,255,255,0.2);flex-wrap:wrap;gap:1rem;}
        .nav-logo{display:flex;align-items:center;gap:12px;color:white;}
        .nav-logo span{font-size:1.3rem;font-weight:700;}
        .nav-logo .gold{color:var(--accent-gold);}
        .nav-links{display:flex;gap:1rem;flex-wrap:wrap;}
        .nav-link{color:white;text-decoration:none;padding:0.5rem 1.2rem;border-radius:30px;transition:all 0.3s;font-weight:500;background:transparent;border:none;cursor:pointer;font-size:0.9rem;}
        .nav-link:hover{background:rgba(255,255,255,0.2);}
        .nav-link.active{background:var(--accent-gold);color:var(--text-dark);font-weight:600;}
        
        /* Main Card */
        .verification-card{background:var(--pure-white);border-radius:40px;padding:2rem;box-shadow:0 30px 60px rgba(0,0,0,0.3);position:relative;overflow:hidden;}
        .verification-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--accent-gold),var(--primary-blue));}
        
        /* Header */
        .verification-header{text-align:center;margin-bottom:2rem;}
        .status-badge{display:inline-flex;align-items:center;gap:8px;padding:0.5rem 1.5rem;border-radius:60px;font-weight:600;margin-bottom:1rem;}
        .status-badge.confirmed{background:rgba(16,185,129,0.1);color:var(--success-green);border:1px solid rgba(16,185,129,0.3);}
        .status-badge.draft{background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.3);}
        .status-badge .dot{width:10px;height:10px;border-radius:50%;animation:pulse 1.5s infinite;}
        .status-badge.confirmed .dot{background:var(--success-green);}
        .status-badge.draft .dot{background:#f59e0b;}
        @keyframes pulse{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.2);opacity:0.7;}100%{transform:scale(1);opacity:1;}}
        .verification-header h1{font-size:2rem;font-weight:800;color:var(--text-dark);margin-bottom:0.5rem;}
        .verification-header p{color:var(--text-light);}
        
        /* Election Selector */
        .election-selector{background:linear-gradient(145deg,#f8fcff,#f0f7ff);border-radius:24px;padding:1.2rem;margin-bottom:1.5rem;border:1px solid var(--border-color);}
        .selector-label{font-size:0.85rem;color:var(--text-light);margin-bottom:0.5rem;display:flex;align-items:center;gap:8px;}
        .election-dropdown{width:100%;padding:0.8rem 1rem;border:2px solid var(--border-color);border-radius:16px;font-size:1rem;font-weight:500;color:var(--text-dark);background:white;cursor:pointer;transition:all 0.2s;}
        .election-dropdown:focus{border-color:var(--accent-gold);outline:none;}
        .election-info{margin-top:0.8rem;font-size:0.8rem;color:var(--text-light);display:flex;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;}
        
        /* Transaction Info */
        .tx-info{background:linear-gradient(145deg,#f8fcff,#f0f7ff);border-radius:24px;padding:1.2rem;margin-bottom:1.5rem;border:1px solid var(--border-color);}
        .tx-label{display:flex;align-items:center;gap:8px;color:var(--text-light);font-size:0.8rem;margin-bottom:0.5rem;}
        .tx-hash{background:var(--pure-white);padding:0.8rem;border-radius:16px;font-family:monospace;font-size:0.85rem;word-break:break-all;color:var(--primary-blue);font-weight:600;border:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;}
        .copy-btn{background:none;border:none;color:var(--text-light);cursor:pointer;font-size:1rem;padding:0.2rem 0.5rem;border-radius:8px;}
        .copy-btn:hover{background:var(--light-blue);}
        
        /* Stats Grid */
        .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem;}
        .stat-card{background:var(--off-white);border-radius:20px;padding:1rem;text-align:center;border:1px solid var(--border-color);}
        .stat-value{font-size:1.8rem;font-weight:700;color:var(--primary-blue);}
        .stat-label{font-size:0.7rem;color:var(--text-light);text-transform:uppercase;}
        
        /* Votes Grid */
        .votes-section{margin-bottom:1.5rem;}
        .section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;}
        .section-title h2{font-size:1.2rem;font-weight:700;color:var(--text-dark);}
        .section-title span{background:var(--light-blue);padding:0.2rem 0.8rem;border-radius:50px;font-size:0.75rem;font-weight:600;color:var(--primary-blue);}
        .votes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;}
        .vote-card{background:var(--off-white);border-radius:20px;padding:1rem;border:1px solid var(--border-color);transition:all 0.2s;}
        .vote-card:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(0,0,0,0.05);border-color:var(--accent-gold);}
        .vote-position{font-size:0.75rem;color:var(--text-light);margin-bottom:0.3rem;display:flex;align-items:center;gap:5px;}
        .vote-position .dot{width:6px;height:6px;background:var(--accent-gold);border-radius:50%;}
        .vote-candidate{font-size:0.9rem;font-weight:700;color:var(--primary-blue);}
        .vote-candidate.abstain{color:var(--text-light);font-style:italic;}
        
        /* Buttons */
        .action-buttons{display:flex;gap:1rem;margin-top:1.5rem;justify-content:center;flex-wrap:wrap;}
        .btn-primary{background:var(--primary-blue);color:white;padding:0.7rem 1.2rem;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:all 0.3s;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
        .btn-primary:hover{background:var(--secondary-blue);transform:translateY(-2px);}
        .btn-secondary{background:white;color:var(--primary-blue);padding:0.7rem 1.2rem;border:2px solid var(--primary-blue);border-radius:12px;font-weight:600;cursor:pointer;transition:all 0.3s;text-decoration:none;}
        .btn-gold{background:var(--accent-gold);color:var(--text-dark);padding:0.7rem 1.2rem;border:none;border-radius:12px;font-weight:600;cursor:pointer;}
        .no-votes{text-align:center;padding:2rem;background:var(--off-white);border-radius:20px;border:2px dashed var(--border-color);}
        .timestamp{text-align:center;margin-top:1.5rem;color:var(--text-light);font-size:0.7rem;}
        .loading{text-align:center;padding:2rem;color:var(--text-light);}
        
        @media (max-width:768px){
            body{padding:1rem;}
            .verification-card{padding:1.2rem;}
            .stats-grid{grid-template-columns:1fr;}
            .nav-bar{flex-direction:column;border-radius:20px;}
            .votes-grid{grid-template-columns:1fr;}
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav-bar">
            <div class="nav-logo"><span>KIBU<span class="gold">eVote</span></span></div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="voting.html" class="nav-link">Vote</a>
                <a href="verification.html" class="nav-link active">My Votes</a>
                <a href="results.html" class="nav-link">Results</a>
                <button onclick="logout()" class="nav-link">Logout</button>
            </div>
        </nav>

        <div class="verification-card">
            <div class="verification-header">
                <div id="statusBadge"></div>
                <h1>My Votes</h1>
                <p>Your votes are securely recorded on the Sepolia blockchain</p>
            </div>

            <!-- Election Dropdown Selector -->
            <div class="election-selector">
                <div class="selector-label">📋 Select Election to View</div>
                <select id="electionSelect" class="election-dropdown" onchange="switchElection()">
                    <option value="">Loading elections...</option>
                </select>
                <div id="electionInfo" class="election-info"></div>
            </div>

            <div id="txInfo" class="tx-info" style="display: none;"></div>
            <div class="stats-grid" id="statsGrid" style="display: none;"></div>

            <div class="votes-section">
                <div class="section-title">
                    <h2>Your Selections</h2>
                    <span id="votesCount">0/0</span>
                </div>
                <div id="votesGrid"></div>
            </div>

            <div class="action-buttons" id="actionButtons"></div>
            <div class="timestamp" id="timestamp"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <script>
        const API_BASE = 'https://kibu-evote-backend.onrender.com/api/v1';
        let allElections = [];
        let currentElection = null;
        let currentPositions = [];
        let currentVoteData = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadElections();
        });

        async function loadElections() {
            try {
                const response = await fetch(`${API_BASE}/elections`);
                const data = await response.json();
                allElections = data.data || [];
                
                const select = document.getElementById('electionSelect');
                select.innerHTML = '<option value="">-- Select an election --</option>';
                
                allElections.forEach(election => {
                    const statusText = election.status === 'active' ? '🟢 Active' : '🔴 Ended';
                    select.innerHTML += `<option value="${election._id}">${election.title} (${statusText})</option>`;
                });
                
                // Check if there's a selected election from dashboard
                const savedElectionId = sessionStorage.getItem('selectedElectionId');
                if (savedElectionId && allElections.find(e => e._id == savedElectionId)) {
                    select.value = savedElectionId;
                    await loadVotesForElection(savedElectionId);
                } else if (allElections.length > 0) {
                    // Default to first election
                    select.value = allElections[0]._id;
                    await loadVotesForElection(allElections[0]._id);
                }
            } catch (error) {
                console.error('Error loading elections:', error);
                document.getElementById('votesGrid').innerHTML = '<div class="no-votes">Error loading elections. Please refresh.</div>';
            }
        }

        async function switchElection() {
            const select = document.getElementById('electionSelect');
            const electionId = select.value;
            
            if (!electionId) {
                document.getElementById('votesGrid').innerHTML = '<div class="no-votes">Select an election to view your votes.</div>';
                document.getElementById('statsGrid').style.display = 'none';
                return;
            }
            
            await loadVotesForElection(electionId);
        }

        async function loadVotesForElection(electionId) {
            const regNumber = sessionStorage.getItem('regNumber') || localStorage.getItem('regNumber');
            
            if (!regNumber) {
                showNoVotes('Please login to view your votes', 'login');
                return;
            }

            document.getElementById('votesGrid').innerHTML = '<div class="loading">🔄 Loading your votes...</div>';
            document.getElementById('statsGrid').style.display = 'none';
            document.getElementById('txInfo').style.display = 'none';

            try {
                // Find the selected election
                currentElection = allElections.find(e => e._id == electionId);
                
                if (!currentElection) {
                    showNoVotes('Election not found', 'dashboard');
                    return;
                }
                
                // Update election info display
                document.getElementById('electionInfo').innerHTML = `
                    <span>📅 Ends: ${new Date(currentElection.endDate).toLocaleString()}</span>
                    <span>👥 Voters: ${currentElection.totalVoters || 'N/A'}</span>
                    <span>📊 Status: ${currentElection.status === 'active' ? '🟢 Active' : '🔴 Ended'}</span>
                `;
                
                // Get positions for this election
                const positionsRes = await fetch(`${API_BASE}/positions/election/${currentElection._id}`);
                const positionsData = await positionsRes.json();
                currentPositions = positionsData.data || [];
                
                if (currentElection.positions && currentPositions.length === 0) {
                    currentPositions = currentElection.positions;
                }
                
                // Get user's votes for THIS SPECIFIC election
                const votesRes = await fetch(`${API_BASE}/votes/check/${regNumber}/${currentElection._id}`);
                const votesData = await votesRes.json();
                
                if (votesData.hasVoted && votesData.voteData) {
                    currentVoteData = votesData.voteData;
                    displayConfirmedVotes(currentVoteData);
                } else {
                    // Check draft for this specific election
                    const draftKey = `draft_${regNumber}_${currentElection._id}`;
                    const draft = localStorage.getItem(draftKey);
                    
                    if (draft) {
                        const draftData = JSON.parse(draft);
                        displayDraftVotes(draftData.votes, draftData.timestamp);
                    } else {
                        // Check old draft format as fallback
                        const oldDraftKey = `draft_${regNumber}`;
                        const oldDraft = localStorage.getItem(oldDraftKey);
                        if (oldDraft) {
                            const draftData = JSON.parse(oldDraft);
                            displayDraftVotes(draftData.votes, draftData.timestamp);
                        } else {
                            showNoVotesForElection();
                        }
                    }
                }
                
            } catch (error) {
                console.error('Error loading votes:', error);
                showNoVotes('Error loading votes: ' + error.message, 'dashboard');
            }
        }

        function showNoVotesForElection() {
            document.getElementById('statusBadge').innerHTML = `
                <div class="status-badge draft">
                    <span class="dot"></span>
                    <span>📝 No Votes Yet</span>
                </div>
            `;
            document.getElementById('statsGrid').style.display = 'none';
            document.getElementById('votesGrid').innerHTML = `
                <div class="no-votes">
                    <div style="font-size:2rem; margin-bottom:0.5rem;">🗳️</div>
                    <h3>No Votes Found</h3>
                    <p>You haven't voted in <strong>${currentElection?.title || 'this election'}</strong> yet.</p>
                    <a href="voting.html" class="btn-primary" style="display: inline-block; margin-top: 1rem; text-decoration: none;">Go Vote Now</a>
                </div>
            `;
            document.getElementById('votesCount').textContent = `0/${currentPositions.length}`;
            document.getElementById('actionButtons').innerHTML = `
                <a href="dashboard.html" class="btn-secondary">← Back to Dashboard</a>
                <a href="voting.html" class="btn-primary">🗳️ Vote Now</a>
            `;
            document.getElementById('timestamp').innerHTML = '';
        }

        function displayConfirmedVotes(voteData) {
            document.getElementById('statusBadge').innerHTML = `
                <div class="status-badge confirmed">
                    <span class="dot"></span>
                    <span>✓ Blockchain Verified</span>
                </div>
            `;
            
            // Count completed positions
            let completed = 0;
            const votes = voteData.votes || {};
            for (const position of currentPositions) {
                if (votes[position.title] && votes[position.title] !== 'Not selected' && votes[position.title] !== 'Abstain') {
                    completed++;
                }
            }
            
            const percentage = currentPositions.length > 0 ? Math.round((completed / currentPositions.length) * 100) : 0;
            
            document.getElementById('statsGrid').style.display = 'grid';
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Positions Voted</div></div>
                <div class="stat-card"><div class="stat-value">${percentage}%</div><div class="stat-label">Completion</div></div>
                <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Candidates Chosen</div></div>
            `;
            
            document.getElementById('votesCount').textContent = `${completed}/${currentPositions.length}`;
            document.getElementById('timestamp').innerHTML = `✓ Recorded on blockchain • ${new Date(voteData.timestamp).toLocaleString()}`;
            
            // Show transaction info
            if (voteData.transactionHash) {
                document.getElementById('txInfo').style.display = 'block';
                document.getElementById('txInfo').innerHTML = `
                    <div class="tx-label"><span>🔗</span><span>Transaction Hash</span></div>
                    <div class="tx-hash">
                        <span>${voteData.transactionHash}</span>
                        <button class="copy-btn" onclick="copyToClipboard('${voteData.transactionHash}')">📋</button>
                    </div>
                    <div style="display:flex; gap:1rem; margin-top:0.5rem; font-size:0.7rem; color:#64748b; flex-wrap:wrap;">
                        <span>⛓️ Network: Sepolia</span>
                        <span>✓ Status: Confirmed</span>
                        <span>📦 Block: ${voteData.blockNumber || 'N/A'}</span>
                    </div>
                `;
            }
            
            displayVotesGrid(votes);
            
            document.getElementById('actionButtons').innerHTML = `
                <a href="dashboard.html" class="btn-secondary">← Back to Dashboard</a>
                <a href="results.html" class="btn-primary">📊 View Results</a>
                ${voteData.transactionHash ? `<button class="btn-gold" onclick="verifyOnEtherscan('${voteData.transactionHash}')">🔍 Verify on Blockchain</button>` : ''}
            `;
        }

        function displayDraftVotes(votes, timestamp) {
            document.getElementById('statusBadge').innerHTML = `
                <div class="status-badge draft">
                    <span class="dot"></span>
                    <span>📝 Draft - Not Submitted</span>
                </div>
            `;
            
            let completed = 0;
            for (const position of currentPositions) {
                if (votes[position.title] && votes[position.title] !== 'Not selected' && votes[position.title] !== 'Abstain') {
                    completed++;
                }
            }
            
            const percentage = currentPositions.length > 0 ? Math.round((completed / currentPositions.length) * 100) : 0;
            
            document.getElementById('statsGrid').style.display = 'grid';
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Positions Voted</div></div>
                <div class="stat-card"><div class="stat-value">${percentage}%</div><div class="stat-label">Completion</div></div>
                <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Candidates Chosen</div></div>
            `;
            
            document.getElementById('votesCount').textContent = `${completed}/${currentPositions.length}`;
            document.getElementById('timestamp').innerHTML = `📝 Draft saved on ${timestamp ? new Date(timestamp).toLocaleString() : new Date().toLocaleString()}`;
            
            displayVotesGrid(votes);
            
            const allCompleted = completed === currentPositions.length && currentPositions.length > 0;
            document.getElementById('actionButtons').innerHTML = `
                <a href="dashboard.html" class="btn-secondary">← Back to Dashboard</a>
                <a href="voting.html" class="btn-primary">${allCompleted ? '⛓️ Submit to Blockchain' : '✏️ Continue Voting'}</a>
            `;
        }

        function displayVotesGrid(votes) {
            const grid = document.getElementById('votesGrid');
            grid.innerHTML = '';
            
            if (currentPositions.length === 0) {
                grid.innerHTML = '<div class="no-votes">No positions found for this election.</div>';
                return;
            }
            
            for (const position of currentPositions) {
                const positionTitle = position.title;
                const candidate = votes[positionTitle] || 'Not selected';
                const isAbstain = candidate === 'Abstain';
                const isNotSelected = candidate === 'Not selected';
                
                const card = document.createElement('div');
                card.className = 'vote-card';
                card.innerHTML = `
                    <div class="vote-position"><span class="dot"></span>${positionTitle}</div>
                    <div class="vote-candidate ${isAbstain ? 'abstain' : ''}">
                        ${isAbstain ? '⚪ Abstained' : (isNotSelected ? '❌ Not selected' : candidate)}
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function showNoVotes(message, action) {
            document.getElementById('statusBadge').innerHTML = '';
            document.getElementById('statsGrid').style.display = 'none';
            document.getElementById('votesGrid').innerHTML = `
                <div class="no-votes">
                    <div style="font-size:2rem;">🗳️</div>
                    <h3>No Votes Found</h3>
                    <p>${message}</p>
                    <a href="${action === 'vote' ? 'voting.html' : (action === 'login' ? 'login.html' : 'dashboard.html')}" class="btn-primary" style="display: inline-block; margin-top: 1rem; text-decoration: none;">
                        ${action === 'vote' ? 'Go Vote Now' : (action === 'login' ? 'Login' : 'Go to Dashboard')}
                    </a>
                </div>
            `;
            document.getElementById('votesCount').textContent = '0/0';
            document.getElementById('actionButtons').innerHTML = '';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert('Transaction hash copied!'));
        }

        function verifyOnEtherscan(txHash) {
            if (txHash) window.open(`https://sepolia.etherscan.io/tx/${txHash}`, '_blank');
            else alert('No transaction hash available');
        }

        async function logout() {
            sessionStorage.clear();
            localStorage.removeItem('adminToken');
            localStorage.removeItem('isAdmin');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
