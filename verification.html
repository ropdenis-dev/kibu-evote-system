<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIBU eVote | My Votes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0a2c4e;
            --secondary-blue: #1e4a7a;
            --light-blue: #eef5ff;
            --accent-gold: #f5b342;
            --dark-gold: #d4942c;
            --pure-white: #ffffff;
            --off-white: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --text-lighter: #94a3b8;
            --success-green: #10b981;
            --warning-orange: #f59e0b;
            --border-color: #edf2f7;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .verification-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .nav-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .nav-logo span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-logo .gold {
            color: var(--accent-gold);
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.2);
        }

        .nav-link.active {
            background: var(--accent-gold);
            color: var(--text-dark);
            font-weight: 600;
        }

        .verification-card {
            background: var(--pure-white);
            border-radius: 40px;
            padding: 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .verification-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent-gold), var(--primary-blue));
        }

        .verification-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .status-badge.draft {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning-orange);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-badge.confirmed {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .status-badge.draft .dot {
            background: var(--warning-orange);
        }

        .status-badge.confirmed .dot {
            background: var(--success-green);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .verification-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .verification-header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        .tx-info {
            background: linear-gradient(145deg, #f8fcff, #f0f7ff);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        .tx-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .tx-hash {
            background: var(--pure-white);
            padding: 1rem;
            border-radius: 16px;
            font-family: monospace;
            font-size: 1rem;
            word-break: break-all;
            color: var(--primary-blue);
            font-weight: 600;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.2rem 0.5rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--light-blue);
            color: var(--primary-blue);
        }

        .tx-meta {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--off-white);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 0.3rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .votes-section {
            margin-bottom: 2rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .section-title h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .section-title span {
            background: var(--light-blue);
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary-blue);
        }

        .votes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .vote-card {
            background: var(--off-white);
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .vote-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-gold);
        }

        .vote-position {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .vote-position .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-gold);
            border-radius: 50%;
        }

        .vote-candidate {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 0.3rem;
        }

        .vote-candidate.draft {
            color: var(--warning-orange);
        }

        .vote-candidate.abstain {
            color: var(--text-light);
            font-style: italic;
        }

        .vote-course {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: var(--secondary-blue);
            transform: translateY(-2px);
        }

        .btn-warning {
            background: var(--warning-orange);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-warning:hover {
            background: #d97706;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: var(--primary-blue);
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--primary-blue);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary:hover {
            background: var(--light-blue);
        }

        .btn-gold {
            background: var(--accent-gold);
            color: var(--text-dark);
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-gold:hover {
            background: var(--dark-gold);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success-green);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .no-votes {
            text-align: center;
            padding: 3rem;
            background: var(--off-white);
            border-radius: 20px;
            border: 2px dashed var(--border-color);
        }

        .no-votes-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .no-votes h3 {
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .no-votes p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .timestamp {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .verification-card {
                padding: 1.5rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .nav-bar {
                flex-direction: column;
                gap: 1rem;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="verification-container">
        <nav class="nav-bar">
            <div class="nav-logo">
                <span>KIBU<span class="gold">eVote</span></span>
            </div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="voting.html" class="nav-link">Vote</a>
                <a href="verification.html" class="nav-link active">My Votes</a>
                <a href="results.html" class="nav-link">Results</a>
                <button onclick="logout()" class="nav-link" style="background:none; border:none; cursor:pointer;"> Logout</button>
            </div>
        </nav>

        <div class="verification-card">
            <div class="verification-header">
                <div id="statusBadge"></div>
                <h1>My Votes</h1>
                <p>Your votes are securely recorded on the Sepolia blockchain</p>
            </div>

            <div id="txInfo" class="tx-info" style="display: none;"></div>

            <div class="stats-grid" id="statsGrid" style="display: none;"></div>

            <div class="votes-section">
                <div class="section-title">
                    <h2>Your Selections</h2>
                    <span id="votesCount">0/0</span>
                </div>
                <div id="votesGrid"></div>
            </div>

            <div class="action-buttons" id="actionButtons"></div>

            <div class="timestamp" id="timestamp"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <script>
        // Global variables
        let currentPositions = [];

        document.addEventListener('DOMContentLoaded', function() {
            loadRealVotes();
        });

        function loadRealVotes() {
            const currentRegNumber = sessionStorage.getItem('regNumber') || localStorage.getItem('regNumber');
            
            if (!currentRegNumber) {
                showNoVotes('Please login to view your votes', 'login');
                return;
            }

            // Get active election first
            const elections = JSON.parse(localStorage.getItem('admin_elections') || '[]');
            const activeElection = elections.find(e => e.status === 'active');
            
            if (activeElection) {
                // Get positions from active election
                const positions = JSON.parse(localStorage.getItem(`admin_positions_${activeElection.id}`) || '[]');
                currentPositions = positions.sort((a, b) => a.order - b.order);
            } else {
                currentPositions = [];
            }

            // User-specific keys
            const voteKey = `vote_${currentRegNumber}`;
            const draftKey = `draft_${currentRegNumber}`;
            
            const savedVote = localStorage.getItem(voteKey);
            const userDraft = localStorage.getItem(draftKey);
            
            let votes = null;
            let isSubmitted = false;
            let txHash = null;
            let timestamp = null;
            
            // First check if vote is confirmed (submitted to blockchain)
            if (savedVote) {
                try {
                    const voteData = JSON.parse(savedVote);
                    votes = voteData.votes || voteData;
                    txHash = voteData.transactionHash;
                    timestamp = voteData.timestamp;
                    isSubmitted = true;
                } catch(e) {
                    console.error('Error parsing saved vote:', e);
                }
            }
            
            // If no confirmed vote, check for user-specific draft
            if (!votes && userDraft) {
                try {
                    const draft = JSON.parse(userDraft);
                    if (draft.votes && Object.keys(draft.votes).length > 0) {
                        votes = draft.votes;
                        isSubmitted = false;
                        timestamp = draft.timestamp;
                    }
                } catch(e) {
                    console.error('Error parsing draft:', e);
                }
            }
            
            // If still no votes, show empty state
            if (!votes || Object.keys(votes).length === 0) {
                showNoVotes('You haven\'t selected any votes yet.', 'vote');
                return;
            }
            
            // Display the votes with appropriate status
            displayVotes(votes, isSubmitted, txHash, timestamp);
        }

        function displayVotes(votes, isSubmitted, txHash, timestamp) {
            // Count only positions that have actual candidate selections
            const totalPositions = currentPositions.length;
            let completed = 0;
            
            for (const position of currentPositions) {
                const vote = votes[position.title];
                if (vote && vote !== 'Not selected' && vote !== 'Abstain') {
                    completed++;
                }
            }
            
            const percentage = totalPositions > 0 ? Math.round((completed / totalPositions) * 100) : 0;
            const allCompleted = (completed === totalPositions && totalPositions > 0);
            
            // Show status badge
            const statusBadge = document.getElementById('statusBadge');
            if (isSubmitted) {
                statusBadge.innerHTML = `
                    <div class="status-badge confirmed">
                        <span class="dot"></span>
                        <span>✓ Blockchain Verified</span>
                    </div>
                `;
                document.getElementById('timestamp').innerHTML = `✓ Recorded on blockchain • ${timestamp ? new Date(timestamp).toLocaleString() : new Date().toLocaleString()}`;
            } else {
                statusBadge.innerHTML = `
                    <div class="status-badge draft">
                        <span class="dot"></span>
                        <span>📝 Draft - ${completed}/${totalPositions} Completed</span>
                    </div>
                `;
                document.getElementById('timestamp').innerHTML = `Draft saved on ${timestamp ? new Date(timestamp).toLocaleString() : new Date().toLocaleString()}`;
            }
            
            // Show stats grid
            document.getElementById('statsGrid').style.display = 'grid';
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${completed}</div>
                    <div class="stat-label">Positions Voted</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${percentage}%</div>
                    <div class="stat-label">Completion</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${Object.values(votes).filter(v => v !== 'Abstain' && v !== 'Not selected').length}</div>
                    <div class="stat-label">Candidates Chosen</div>
                </div>
            `;
            
            document.getElementById('votesCount').textContent = `${completed}/${totalPositions}`;
            
            // Display votes grid based on current positions
            const grid = document.getElementById('votesGrid');
            grid.innerHTML = '';
            
            if (currentPositions.length === 0) {
                grid.innerHTML = '<div class="no-votes"><p>No active election found.</p></div>';
                return;
            }
            
            for (const position of currentPositions) {
                const positionTitle = position.title;
                const candidate = votes[positionTitle] || 'Not selected';
                const isAbstain = candidate === 'Abstain';
                const isNotSelected = candidate === 'Not selected';
                
                const card = document.createElement('div');
                card.className = 'vote-card';
                card.innerHTML = `
                    <div class="vote-position">
                        <span class="dot"></span>
                        ${positionTitle}
                    </div>
                    <div class="vote-candidate ${!isSubmitted ? 'draft' : ''} ${isAbstain ? 'abstain' : ''}">
                        ${isAbstain ? '⚪ Abstained' : (isNotSelected ? '❌ Not selected' : candidate)}
                    </div>
                `;
                grid.appendChild(card);
            }
            
            // Show action buttons
            const actionButtons = document.getElementById('actionButtons');
            
            if (isSubmitted) {
                // User has already submitted to blockchain
                actionButtons.innerHTML = `
                    <a href="dashboard.html" class="btn-secondary">
                        ← Back to Dashboard
                    </a>
                    <a href="results.html" class="btn-primary">
                        View Results →
                    </a>
                    <button class="btn-gold" onclick="verifyOnEtherscan('${txHash || ''}')">
                        🔍 Verify on Blockchain Explorer
                    </button>
                `;
                
                if (txHash) {
                    document.getElementById('txInfo').style.display = 'block';
                    document.getElementById('txInfo').innerHTML = `
                        <div class="tx-label">
                            <span>🔗</span>
                            <span>Transaction Hash</span>
                        </div>
                        <div class="tx-hash">
                            <span>${txHash}</span>
                            <button class="copy-btn" onclick="copyToClipboard('${txHash}')">📋</button>
                        </div>
                        <div class="tx-meta">
                            <div class="tx-meta-item">
                                <span>⏱️</span>
                                <span>Submitted: ${timestamp ? new Date(timestamp).toLocaleString() : new Date().toLocaleString()}</span>
                            </div>
                            <div class="tx-meta-item">
                                <span>⛓️</span>
                                <span>Network: Sepolia</span>
                            </div>
                            <div class="tx-meta-item">
                                <span>✓</span>
                                <span>Status: Confirmed</span>
                            </div>
                        </div>
                    `;
                }
            } else {
                // User has draft
                if (allCompleted && totalPositions > 0) {
                    actionButtons.innerHTML = `
                        <a href="dashboard.html" class="btn-secondary">
                            ← Back to Dashboard
                        </a>
                        <a href="voting.html" class="btn-warning">
                            ⛓️ Submit to Blockchain
                        </a>
                    `;
                } else {
                    actionButtons.innerHTML = `
                        <a href="dashboard.html" class="btn-secondary">
                            ← Back to Dashboard
                        </a>
                        <a href="voting.html" class="btn-primary">
                            ✏️ Continue Voting (${completed}/${totalPositions} completed)
                        </a>
                    `;
                }
            }
        }

        function showNoVotes(message, action) {
            const grid = document.getElementById('votesGrid');
            grid.innerHTML = `
                <div class="no-votes">
                    <div class="no-votes-icon">🗳️</div>
                    <h3>No Votes Found</h3>
                    <p>${message}</p>
                    <a href="${action === 'vote' ? 'voting.html' : 'login.html'}" class="btn-primary" style="display: inline-block; text-decoration: none;">
                        ${action === 'vote' ? 'Go Vote Now' : 'Login'}
                    </a>
                </div>
            `;
            document.getElementById('votesCount').textContent = '0/0';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Transaction hash copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy');
            });
        }

        function verifyOnEtherscan(txHash) {
            if (txHash && txHash !== 'undefined') {
                window.open(`https://sepolia.etherscan.io/tx/${txHash}`, '_blank');
            } else {
                alert('No transaction hash available');
            }
        }

        async function logout() {
            try { 
                await API.logout(); 
            } catch(e) { 
                console.error(e); 
            }
            sessionStorage.clear();
            window.location.href = '/login.html';
        }
    </script>
    <script src="./js/features.js"></script>
    <script src="./js/api.js"></script>
</body>
</html>
