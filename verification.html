<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIBU eVote | My Votes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0a2c4e;
            --secondary-blue: #1e4a7a;
            --light-blue: #eef5ff;
            --accent-gold: #f5b342;
            --dark-gold: #d4942c;
            --pure-white: #ffffff;
            --off-white: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --text-lighter: #94a3b8;
            --success-green: #10b981;
            --warning-orange: #f59e0b;
            --border-color: #edf2f7;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .verification-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .nav-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }

        .nav-logo span {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .nav-logo .gold {
            color: var(--accent-gold);
        }

        .nav-links {
            display: flex;
            gap: 1rem;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.2);
        }

        .nav-link.active {
            background: var(--accent-gold);
            color: var(--text-dark);
            font-weight: 600;
        }

        .verification-card {
            background: var(--pure-white);
            border-radius: 40px;
            padding: 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .verification-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent-gold), var(--primary-blue));
        }

        .verification-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .status-badge.confirmed {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-green);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
            background: var(--success-green);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .verification-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .verification-header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        .election-info {
            background: linear-gradient(145deg, #f8fcff, #f0f7ff);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .election-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-blue);
        }

        .tx-info {
            background: linear-gradient(145deg, #f8fcff, #f0f7ff);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        .tx-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .tx-hash {
            background: var(--pure-white);
            padding: 1rem;
            border-radius: 16px;
            font-family: monospace;
            font-size: 1rem;
            word-break: break-all;
            color: var(--primary-blue);
            font-weight: 600;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.2rem 0.5rem;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--off-white);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 0.3rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .votes-section {
            margin-bottom: 2rem;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .section-title h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .section-title span {
            background: var(--light-blue);
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--primary-blue);
        }

        .votes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1rem;
        }

        .vote-card {
            background: var(--off-white);
            border-radius: 20px;
            padding: 1.2rem;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }

        .vote-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent-gold);
        }

        .vote-position {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .vote-position .dot {
            width: 6px;
            height: 6px;
            background: var(--accent-gold);
            border-radius: 50%;
        }

        .vote-candidate {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-blue);
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--primary-blue);
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: var(--secondary-blue);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: var(--primary-blue);
            padding: 0.8rem 1.5rem;
            border: 2px solid var(--primary-blue);
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .no-votes {
            text-align: center;
            padding: 3rem;
            background: var(--off-white);
            border-radius: 20px;
            border: 2px dashed var(--border-color);
        }

        .timestamp {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-light);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            .verification-card { padding: 1.5rem; }
            .stats-grid { grid-template-columns: 1fr; }
            .action-buttons { flex-direction: column; }
            .nav-bar { flex-direction: column; gap: 1rem; border-radius: 20px; }
        }
    </style>
</head>
<body>
    <div class="verification-container">
        <nav class="nav-bar">
            <div class="nav-logo"><span>KIBU<span class="gold">eVote</span></span></div>
            <div class="nav-links">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="voting.html" class="nav-link">Vote</a>
                <a href="verification.html" class="nav-link active">My Votes</a>
                <a href="results.html" class="nav-link">Results</a>
                <button onclick="logout()" class="nav-link" style="background:none; border:none; cursor:pointer;">Logout</button>
            </div>
        </nav>

        <div class="verification-card">
            <div class="verification-header">
                <div id="statusBadge"></div>
                <h1>My Votes</h1>
                <p>Your votes are securely recorded on the Sepolia blockchain</p>
            </div>

            <div id="electionInfo" class="election-info" style="display: none;"></div>
            <div id="txInfo" class="tx-info" style="display: none;"></div>
            <div class="stats-grid" id="statsGrid" style="display: none;"></div>

            <div class="votes-section">
                <div class="section-title">
                    <h2>Your Selections</h2>
                    <span id="votesCount">0/0</span>
                </div>
                <div id="votesGrid"></div>
            </div>

            <div class="action-buttons" id="actionButtons"></div>
            <div class="timestamp" id="timestamp"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
    <script>
        const API_BASE = 'https://kibu-evote-backend.onrender.com/api/v1';
        let currentElection = null;
        let currentPositions = [];
        let userVotes = null;

        document.addEventListener('DOMContentLoaded', function() {
            loadMyVotes();
        });

        async function loadMyVotes() {
            const regNumber = sessionStorage.getItem('regNumber') || localStorage.getItem('regNumber');
            
            if (!regNumber) {
                showNoVotes('Please login to view your votes', 'login');
                return;
            }

            document.getElementById('votesGrid').innerHTML = '<div class="no-votes"><div class="no-votes-icon">🔄</div><h3>Loading your votes...</h3></div>';

            try {
                // Get active election from backend
                const electionsRes = await fetch(`${API_BASE}/elections`);
                const electionsData = await electionsRes.json();
                const elections = electionsData.data || [];
                
                // Get selected election from sessionStorage (from dashboard)
                let selectedElectionId = sessionStorage.getItem('selectedElectionId');
                
                if (selectedElectionId) {
                    currentElection = elections.find(e => e._id == selectedElectionId);
                } else {
                    currentElection = elections.find(e => e.status === 'active') || elections[0];
                }
                
                if (!currentElection) {
                    showNoVotes('No election found. Please contact admin.', 'dashboard');
                    return;
                }
                
                // Display election info
                document.getElementById('electionInfo').style.display = 'block';
                document.getElementById('electionInfo').innerHTML = `
                    <div class="election-title">🗳️ ${currentElection.title}</div>
                    <div style="font-size:0.85rem; color:#64748b; margin-top:0.5rem;">
                        Status: ${currentElection.status === 'active' ? '🟢 Active' : '🔴 Ended'} | 
                        Ends: ${new Date(currentElection.endDate).toLocaleString()}
                    </div>
                `;
                
                // Get positions
                const positionsRes = await fetch(`${API_BASE}/positions/election/${currentElection._id}`);
                const positionsData = await positionsRes.json();
                currentPositions = positionsData.data || [];
                
                if (currentElection.positions && currentPositions.length === 0) {
                    currentPositions = currentElection.positions;
                }
                
                // Get user's votes from backend (check by regNumber)
                const votesRes = await fetch(`${API_BASE}/votes/check/${regNumber}`);
                const votesData = await votesRes.json();
                
                if (votesData.hasVoted && votesData.voteData) {
                    // User has voted
                    userVotes = votesData.voteData;
                    displayConfirmedVotes(votesData.voteData);
                } else {
                    // Check for draft
                    const draftKey = `draft_${regNumber}`;
                    const draft = localStorage.getItem(draftKey);
                    
                    if (draft) {
                        const draftData = JSON.parse(draft);
                        userVotes = draftData.votes;
                        displayDraftVotes(userVotes, draftData.timestamp);
                    } else {
                        showNoVotes('You haven\'t voted in this election yet.', 'vote');
                    }
                }
                
            } catch (error) {
                console.error('Error loading votes:', error);
                showNoVotes('Error loading votes: ' + error.message, 'dashboard');
            }
        }

        function displayConfirmedVotes(voteData) {
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.innerHTML = `
                <div class="status-badge confirmed">
                    <span class="dot"></span>
                    <span>✓ Blockchain Verified</span>
                </div>
            `;
            
            // Count positions voted
            let completed = 0;
            if (voteData.votes) {
                for (const position of currentPositions) {
                    if (voteData.votes[position.title] && voteData.votes[position.title] !== 'Not selected') {
                        completed++;
                    }
                }
            }
            
            const percentage = currentPositions.length > 0 ? Math.round((completed / currentPositions.length) * 100) : 0;
            
            document.getElementById('statsGrid').style.display = 'grid';
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Positions Voted</div></div>
                <div class="stat-card"><div class="stat-value">${percentage}%</div><div class="stat-label">Completion</div></div>
                <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Candidates Chosen</div></div>
            `;
            
            document.getElementById('votesCount').textContent = `${completed}/${currentPositions.length}`;
            document.getElementById('timestamp').innerHTML = `✓ Recorded on blockchain • ${new Date(voteData.timestamp).toLocaleString()}`;
            
            // Show transaction info
            if (voteData.transactionHash) {
                document.getElementById('txInfo').style.display = 'block';
                document.getElementById('txInfo').innerHTML = `
                    <div class="tx-label"><span>🔗</span><span>Transaction Hash</span></div>
                    <div class="tx-hash">
                        <span>${voteData.transactionHash}</span>
                        <button class="copy-btn" onclick="copyToClipboard('${voteData.transactionHash}')">📋</button>
                    </div>
                    <div class="tx-meta" style="display:flex; gap:1rem; margin-top:0.8rem; font-size:0.8rem; color:#64748b;">
                        <span>⛓️ Network: Sepolia</span>
                        <span>✓ Status: Confirmed</span>
                    </div>
                `;
            }
            
            // Display votes grid
            displayVotesGrid(voteData.votes || {});
            
            document.getElementById('actionButtons').innerHTML = `
                <a href="dashboard.html" class="btn-secondary">← Back to Dashboard</a>
                <a href="results.html" class="btn-primary">View Results →</a>
                ${voteData.transactionHash ? `<button class="btn-primary" onclick="verifyOnEtherscan('${voteData.transactionHash}')">🔍 Verify on Blockchain</button>` : ''}
            `;
        }

        function displayDraftVotes(votes, timestamp) {
            const statusBadge = document.getElementById('statusBadge');
            statusBadge.innerHTML = `
                <div class="status-badge confirmed" style="background:rgba(245,158,11,0.1); color:#f59e0b; border-color:rgba(245,158,11,0.3);">
                    <span class="dot" style="background:#f59e0b;"></span>
                    <span>📝 Draft - Not Submitted</span>
                </div>
            `;
            
            let completed = 0;
            for (const position of currentPositions) {
                if (votes[position.title] && votes[position.title] !== 'Not selected') {
                    completed++;
                }
            }
            
            const percentage = currentPositions.length > 0 ? Math.round((completed / currentPositions.length) * 100) : 0;
            
            document.getElementById('statsGrid').style.display = 'grid';
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Positions Voted</div></div>
                <div class="stat-card"><div class="stat-value">${percentage}%</div><div class="stat-label">Completion</div></div>
                <div class="stat-card"><div class="stat-value">${completed}</div><div class="stat-label">Candidates Chosen</div></div>
            `;
            
            document.getElementById('votesCount').textContent = `${completed}/${currentPositions.length}`;
            document.getElementById('timestamp').innerHTML = `Draft saved on ${timestamp ? new Date(timestamp).toLocaleString() : new Date().toLocaleString()}`;
            
            displayVotesGrid(votes);
            
            const allCompleted = completed === currentPositions.length && currentPositions.length > 0;
            document.getElementById('actionButtons').innerHTML = `
                <a href="dashboard.html" class="btn-secondary">← Back to Dashboard</a>
                ${allCompleted ? 
                    `<a href="voting.html" class="btn-primary">⛓️ Submit to Blockchain</a>` : 
                    `<a href="voting.html" class="btn-primary">✏️ Continue Voting (${completed}/${currentPositions.length})</a>`
                }
            `;
        }

        function displayVotesGrid(votes) {
            const grid = document.getElementById('votesGrid');
            grid.innerHTML = '';
            
            if (currentPositions.length === 0) {
                grid.innerHTML = '<div class="no-votes"><p>No positions found for this election.</p></div>';
                return;
            }
            
            for (const position of currentPositions) {
                const positionTitle = position.title;
                const candidate = votes[positionTitle] || 'Not selected';
                const isAbstain = candidate === 'Abstain';
                const isNotSelected = candidate === 'Not selected';
                
                const card = document.createElement('div');
                card.className = 'vote-card';
                card.innerHTML = `
                    <div class="vote-position"><span class="dot"></span>${positionTitle}</div>
                    <div class="vote-candidate">
                        ${isAbstain ? '⚪ Abstained' : (isNotSelected ? '❌ Not selected' : candidate)}
                    </div>
                `;
                grid.appendChild(card);
            }
        }

        function showNoVotes(message, action) {
            document.getElementById('statusBadge').innerHTML = '';
            document.getElementById('statsGrid').style.display = 'none';
            document.getElementById('votesGrid').innerHTML = `
                <div class="no-votes">
                    <div class="no-votes-icon">🗳️</div>
                    <h3>No Votes Found</h3>
                    <p>${message}</p>
                    <a href="${action === 'vote' ? 'voting.html' : (action === 'login' ? 'login.html' : 'dashboard.html')}" class="btn-primary" style="display: inline-block; text-decoration: none; margin-top: 1rem;">
                        ${action === 'vote' ? 'Go Vote Now' : (action === 'login' ? 'Login' : 'Go to Dashboard')}
                    </a>
                </div>
            `;
            document.getElementById('votesCount').textContent = '0/0';
            document.getElementById('actionButtons').innerHTML = '';
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => alert('Transaction hash copied!'));
        }

        function verifyOnEtherscan(txHash) {
            if (txHash) window.open(`https://sepolia.etherscan.io/tx/${txHash}`, '_blank');
            else alert('No transaction hash available');
        }

        async function logout() {
            sessionStorage.clear();
            localStorage.removeItem('adminToken');
            localStorage.removeItem('isAdmin');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
