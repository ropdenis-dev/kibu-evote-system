<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>KIBU eVote | Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #1a4b8c;
            --secondary-blue: #2a6bc1;
            --light-blue: #e8f0fe;
            --accent-gold: #ffb347;
            --dark-gold: #d48c2c;
            --pure-white: #ffffff;
            --off-white: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --success-green: #10b981;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--light-blue) 0%, var(--pure-white) 100%);
            min-height: 100vh;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .forgot-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            margin: 0;
        }

        .forgot-card {
            background: var(--pure-white);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            padding: 2rem 2rem;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            width: 100%;
            max-width: 460px;
            max-height: 90vh;
            transition: all 0.2s ease;
        }

        .forgot-card::-webkit-scrollbar {
            width: 5px;
        }

        .forgot-card::-webkit-scrollbar-track {
            background: var(--border-color);
            border-radius: 10px;
            margin: 10px 0;
        }

        .forgot-card::-webkit-scrollbar-thumb {
            background: var(--primary-blue);
            border-radius: 10px;
        }

        .forgot-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-blue), var(--accent-gold));
            border-radius: 28px 28px 0 0;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 1.7rem;
        }

        .logo-section img {
            width: 70px;
            height: 70px;
            border-radius: 18px;
            margin-bottom: 1rem;
            background: var(--light-blue);
            padding: 10px;
            object-fit: contain;
        }

        .logo-section h1 {
            font-size: 1.85rem;
            color: var(--primary-blue);
            font-weight: 300;
            margin-bottom: 0.3rem;
            letter-spacing: -0.3px;
        }

        .logo-section p {
            color: var(--text-light);
            font-size: 0.9rem;
            font-weight: 300;
        }

        .logo-section span {
            color: var(--accent-gold);
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 1.35rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 300;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            background: var(--pure-white);
        }

        .form-group input:focus {
            border-color: var(--accent-gold);
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 180, 71, 0.1);
        }

        .input-hint {
            font-size: 0.7rem;
            color: var(--text-light);
            margin-top: 0.4rem;
            display: block;
            font-weight: 300;
        }

        .reset-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1rem;
            font-family: 'Inter', sans-serif;
        }

        .reset-btn:hover {
            background: var(--secondary-blue);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(26, 75, 140, 0.3);
        }

        .reset-btn:active {
            transform: translateY(0);
        }

        .reset-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
            font-weight: 300;
        }

        .back-link a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 300;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--dark-gold);
            text-decoration: underline;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 300;
        }

        /* Success Message */
        .success-message {
            background: var(--success-green);
            color: white;
            padding: 0.8rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: 300;
            font-size: 0.9rem;
            display: none;
        }

        .error-message {
            background: #ef4444;
            color: white;
            padding: 0.8rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: 300;
            font-size: 0.9rem;
            display: none;
        }

        /* Responsive Styles */
        @media (min-width: 1024px) {
            .forgot-container {
                padding: 2rem;
            }
            .forgot-card {
                max-width: 500px;
                padding: 2.5rem 2.2rem;
                max-height: 85vh;
            }
            .logo-section {
                margin-bottom: 2rem;
            }
            .logo-section img {
                width: 80px;
                height: 80px;
            }
        }

        @media (min-width: 768px) and (max-width: 1023px) {
            .forgot-container {
                padding: 1.5rem;
            }
            .forgot-card {
                max-width: 450px;
                padding: 2rem 2rem;
                max-height: 90vh;
            }
        }

        @media (max-width: 480px) {
            .forgot-container {
                padding: 0.5rem;
            }
            .forgot-card {
                max-width: 100%;
                padding: 1.5rem 1.25rem;
                border-radius: 24px;
                max-height: 96vh;
            }
            .logo-section {
                margin-bottom: 1.25rem;
            }
            .logo-section img {
                width: 55px;
                height: 55px;
                margin-bottom: 0.75rem;
            }
            .logo-section h1 {
                font-size: 1.5rem;
            }
            .logo-section p {
                font-size: 0.85rem;
            }
            .form-group {
                margin-bottom: 1rem;
            }
            .form-group label {
                font-size: 0.85rem;
            }
            .form-group input {
                padding: 0.7rem 0.9rem;
                font-size: 0.9rem;
            }
            .reset-btn {
                padding: 0.85rem;
                font-size: 0.95rem;
                margin-bottom: 0.8rem;
            }
            .back-link {
                font-size: 0.85rem;
            }
            .footer-text {
                margin-top: 1rem;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 380px) {
            .forgot-container {
                padding: 0.25rem;
            }
            .forgot-card {
                padding: 1rem 1rem;
                max-height: 98vh;
                border-radius: 20px;
            }
            .logo-section img {
                width: 48px;
                height: 48px;
            }
            .logo-section h1 {
                font-size: 1.3rem;
            }
        }

        @media (max-height: 650px) and (max-width: 800px) {
            body {
                position: relative;
                overflow: auto;
            }
            .forgot-container {
                padding: 0.5rem;
                align-items: flex-start;
            }
            .forgot-card {
                padding: 1rem 1.25rem;
                max-height: 98vh;
            }
            .logo-section {
                margin-bottom: 0.75rem;
            }
            .logo-section img {
                width: 45px;
                height: 45px;
                margin-bottom: 0.5rem;
            }
            .logo-section h1 {
                font-size: 1.3rem;
                margin-bottom: 0.1rem;
            }
            .logo-section p {
                font-size: 0.75rem;
            }
            .form-group {
                margin-bottom: 0.75rem;
            }
            .form-group input {
                padding: 0.6rem 0.8rem;
            }
            .reset-btn {
                padding: 0.7rem;
                margin-bottom: 0.5rem;
            }
            .footer-text {
                margin-top: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-card">
            <div class="logo-section">
                <img src="logo.jpg" alt="KIBU Logo" onerror="this.style.display='none'; this.parentElement.insertAdjacentHTML('afterbegin', '<div style=\'width:70px;height:70px;margin:0 auto 1rem;background:#e8f0fe;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;\'>🔐</div>')">
                <h1>Forgot Password</h1>
                <p>Enter your <span>registration number</span> to reset password</p>
            </div>

            <div id="successMessage" class="success-message">
                Password reset link sent to your email!
            </div>
            <div id="errorMessage" class="error-message">
                Registration number not found. Please try again.
            </div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>KIBU Registration Number</label>
                    <input type="text" id="regNumber" placeholder="e.g., BIT/0025/23" required>
                    <small class="input-hint">Format: COURSE/YYYY/YY (e.g., BIT/0025/23)</small>
                </div>

                <button type="submit" class="reset-btn">Send Reset Link</button>
                
                <div class="back-link">
                    <a href="index.html">Back to Sign In</a>
                </div>
            </form>
            <div class="footer-text">2026 KIBU eVote. All rights reserved.</div>
        </div>
    </div>

    <script>
        // Mock API for password reset
        const API = {
            forgotPassword: async function(regNumber) {
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        // Mock validation - accepts any registration number that matches the format
                        const regex = /^[A-Z]{3}\/\d{4}\/\d{2}$/;
                        if (regex.test(regNumber)) {
                            resolve({
                                success: true,
                                message: "Password reset link sent successfully"
                            });
                        } else {
                            reject(new Error("Invalid registration number format"));
                        }
                    }, 1000);
                });
            }
        };

        const form = document.getElementById('forgotPasswordForm');
        const regNumberInput = document.getElementById('regNumber');
        const successMsg = document.getElementById('successMessage');
        const errorMsg = document.getElementById('errorMessage');

        // Hide messages on input
        regNumberInput.addEventListener('input', function() {
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            let regNumber = regNumberInput.value.trim().toUpperCase();
            
            // Validate format
            const regex = /^[A-Z]{3}\/\d{4}\/\d{2}$/;
            if (!regex.test(regNumber)) {
                errorMsg.textContent = 'Please enter a valid registration number (e.g., BIT/0025/23)';
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
                return;
            }
            
            const submitBtn = this.querySelector('.reset-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;
            
            try {
                const result = await API.forgotPassword(regNumber);
                successMsg.style.display = 'block';
                errorMsg.style.display = 'none';
                regNumberInput.value = '';
                
                // Auto hide success message after 5 seconds
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 5000);
            } catch (error) {
                errorMsg.textContent = error.message || 'Registration number not found. Please try again.';
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        });
        
        // Fix for logo image error
        document.querySelectorAll('.logo-section img').forEach(img => {
            img.onerror = function() {
                if (!this.parentElement.querySelector('.fallback-logo')) {
                    const fallback = document.createElement('div');
                    fallback.className = 'fallback-logo';
                    fallback.style.cssText = 'width:70px;height:70px;margin:0 auto 1rem;background:#e8f0fe;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;';
                    fallback.textContent = '';
                    this.style.display = 'none';
                    this.parentElement.insertBefore(fallback, this);
                }
            };
        });
    </script>
</body>
</html>
